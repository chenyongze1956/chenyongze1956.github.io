
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * { -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; box-sizing: border-box; }
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff);    
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            overflow: hidden; font-family: "STKaiti", "KaiTi", serif;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }
        #game-container { position: relative; width: 100%; height: 100%; max-width: 500px; max-height: 900px; display: flex; justify-content: center; align-items: center; }
        canvas { border: 4px solid rgba(255,255,255,0.8); border-radius: 20px; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); width: 95%; height: auto; aspect-ratio: 2 / 3; image-rendering: pixelated; }
        .info { position: absolute; top: 40px; color: #fff; text-align: center; width: 100%; pointer-events: none; }
        #hiScore { font-size: 24px; font-weight: 900; text-shadow: 0 0 10px #fff; }
        #upload-btn { 
            position: absolute; top: 15px; left: 25px; z-index: 100;
            background: rgba(255,255,255,0.2); color: white; 
            width: 34px; height: 34px; display: flex; justify-content: center; align-items: center;
            border-radius: 50%; font-size: 16px; cursor: pointer; border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(2px);
        }
        #faceInput { display: none; }
        #next-hint { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px; border: 2px solid #fff; }
        #next-color-box { width: 30px; height: 30px; border-radius: 5px; }
        #power-ui { position: absolute; bottom: 12%; width: 60%; height: 12px; background: rgba(0,0,0,0.6); border-radius: 6px; border: 2px solid #fff; overflow: hidden; display: none; }
        #power-bar { width: 100%; height: 100%; }
        .tips { position: absolute; bottom: 20px; color: rgba(255,255,255,0.7); font-size: 10px; text-shadow: 1px 1px 2px #000; text-align: center; width: 100%; padding: 0 10px; line-height: 1.4;}
    </style>
</head>
<body>
    <div id="game-container">
        <label id="upload-btn" for="faceInput" title="更换头像">📷</label>
        <input type="file" id="faceInput" accept="image/*">
        <div class="info"><div id="hiScore">HI: 0</div></div>
        <div id="next-hint"><div id="next-color-box"></div></div>
        <div id="power-ui"><div id="power-bar"></div></div>
        <canvas id="birdCanvas"></canvas>
        <div class="tips">左:跳 | 右:色 | 灵:穿 | 兽:拆 | 善:吸 | 恶:毁 | 魔:弑 | 道:化</div>
    </div>
<script>
window.onload = function() {
    const canvas = document.getElementById('birdCanvas');
    const ctx = canvas.getContext('2d');
    const hiScoreEl = document.getElementById('hiScore');
    const nextBox = document.getElementById('next-color-box');
    const powerUI = document.getElementById('power-ui');
    const powerBar = document.getElementById('power-bar');
    const faceInput = document.getElementById('faceInput');
    const LOGICAL_WIDTH = 320, LOGICAL_HEIGHT = 480;
    const COLOR_PALETTE = ['#FF3333', '#FFAC33', '#FFEA33', '#33FF57', '#33DBFF', '#B533FF'];
    
    let birdColorIndex = 2, birdY, birdX, velocity, score, pipes, frame, gameOver;
    let combo = 0, lastPipeColor = '', shake = 0, powerItems = [], particles = [], floatTexts = [], birdHistory = [];
    
    // 核心状态，加入了 'dao' (道)
    let timers = { invinc: 0, sprint: 0, muyu: 0, freeze: 0, light: 0, buddha: 0, ghost: 0, immortal: 0, yao: 0, rage: 0, shan: 0, e: 0, mo: 0, shou: 0, ling: 0, dao: 0 };
    const DURATION = 300;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let userFaceImg = null;

    faceInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => { const img = new Image(); img.onload = () => userFaceImg = img; img.src = event.target.result; };
            reader.readAsDataURL(file);
        }
    });

    function playSound(freq, type, duration, vol=0.08) {
        try {
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    function createParticles(x, y, color, count=10) {
        for(let i=0; i<count; i++) {
            particles.push({ x, y, color, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 1.0, size: Math.random()*3+1 });
        }
    }

    function reset() {
        birdY = 240; birdX = 50; velocity = 0; score = 0; combo = 0; pipes = []; frame = 0; gameOver = false;
        powerItems = []; particles = []; floatTexts = []; birdHistory = []; shake = 0;
        Object.keys(timers).forEach(k => { timers[k] = 0; });
        powerUI.style.display = 'none';
        hiScoreEl.innerText = "HI: " + (localStorage.getItem('pixelBirdHighScore') || 0);
        updateNextHint(); createPipe();
    }

    function updateNextHint() { nextBox.style.backgroundColor = COLOR_PALETTE[(birdColorIndex + 1) % COLOR_PALETTE.length]; }

    function createPipe() {
        const gap = 135; const h = Math.floor(Math.random() * (LOGICAL_HEIGHT - 280)) + 60;
        const pColor = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
        pipes.push({ x: LOGICAL_WIDTH, y: h, gap, passed: false, color: pColor });
        
        const rand = Math.random(); const itemY = h + gap/2;
        // 道具生成，加入“道” (dao)
        if (rand < 0.01) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '道', effect: 'dao', color: '#000000' });
        else if (rand < 0.02) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '灵', effect: 'ling', color: '#00FBFF' });
        else if (rand < 0.035) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '魔', effect: 'mo', color: '#FF0000' });
        else if (rand < 0.05) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '兽', effect: 'shou', color: '#D2691E' });
        else if (rand < 0.07) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'muyu' });
        else if (rand < 0.09) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'star' });
        else if (rand < 0.11) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'bolt' });
        else if (rand < 0.13) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'bomb' });
        else if (rand < 0.16) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '定', effect: 'freeze', color: '#33DBFF' });
        else if (rand < 0.19) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '轻', effect: 'light', color: '#33FF57' });
        else if (rand < 0.22) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '佛', effect: 'buddha', color: '#FFD700' });
        else if (rand < 0.25) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '鬼', effect: 'ghost', color: '#B0B0B0' });
        else if (rand < 0.28) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '仙', effect: 'immortal', color: '#FF99CC' });
        else if (rand < 0.31) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '妖', effect: 'yao', color: '#A020F0' });
        else if (rand < 0.34) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '怒', effect: 'rage', color: '#FF0000' });
        else if (rand < 0.37) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '善', effect: 'shan', color: '#FFFFFF' });
        else if (rand < 0.40) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '恶', effect: 'e', color: '#111111' });
    }

    function handleAction(isRightSide) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (gameOver) { reset(); draw(); return; }
        if (isRightSide) {
            birdColorIndex = (birdColorIndex + 1) % COLOR_PALETTE.length; updateNextHint();
            if (timers.muyu > 0) {
                playSound(800, 'sine', 0.1, 0.4); score += 2;
                floatTexts.push({x: birdX, y: birdY, text: "功德+2", life: 40, color: "#ffd700"});
                for(let p of pipes) { if(!p.passed && p.x > birdX) { p.x = -100; p.passed = true; break; } }
            }
        } else {
            if (timers.sprint === 0) { velocity = (timers.light > 0 || timers.dao > 0 ? -2.2 : -3.5); playSound(300, 'sine', 0.1); }
        }
    }

    function draw() {
        ctx.save();
        if (shake > 0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.8; }
        if (timers.mo > 0 || timers.shou > 0) ctx.translate((Math.random()-0.5)*2, (Math.random()-0.5)*2);
        
        ctx.clearRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
        let step = (timers.sprint > 0) ? 3.5 : (timers.freeze > 0 ? 0 : 1.0);

        const maxActive = Math.max(...Object.values(timers));
        if (maxActive > 0) {
            powerUI.style.display = 'block'; powerBar.style.width = (maxActive / DURATION * 100) + '%';
            Object.keys(timers).forEach(k => { if(timers[k] > 0) timers[k]--; });
            const activeKey = Object.keys(timers).find(k => timers[k] === maxActive);
            const barColors = {dao:'#000', ling:'#00FBFF', shou:'#D2691E', mo:'#600', shan:'#fff', e:'#333', rage:'#f00', yao: '#A020F0', buddha:'#ffd700', sprint:'#fff', light:'#33FF57', freeze:'#33DBFF'};
            powerBar.style.background = barColors[activeKey] || '#fff';
        } else { powerUI.style.display = 'none'; }

        pipes.forEach((p, i) => {
            p.x -= 1.4 * step;
            // “道”态：强制同色感化
            if (timers.dao > 0 && p.x - birdX < 150 && p.x > birdX) { p.color = COLOR_PALETTE[birdColorIndex]; }
            if (timers.rage > 0 && p.x - birdX < 120 && p.x > birdX && !p.passed) { birdColorIndex = COLOR_PALETTE.indexOf(p.color); updateNextHint(); }
            
            ctx.globalAlpha = (timers.ling > 0 || timers.buddha > 0 || timers.ghost > 0 || timers.yao > 0 || timers.e > 0) ? 0.3 : 1.0;
            ctx.fillStyle = p.color; ctx.fillRect(p.x, 0, 50, p.y); ctx.fillRect(p.x, p.y + p.gap, 50, LOGICAL_HEIGHT);
            ctx.globalAlpha = 1.0;

            let hit = (birdX + 26 > p.x && birdX < p.x + 46 && (birdY < p.y || birdY + 22 > p.y + p.gap));
            if (hit && !gameOver) {
                if (timers.dao > 0 || timers.ling > 0) { } // 无伤穿透/感化
                else if (timers.shou > 0) {
                    p.x = -200; p.passed = true; score += 2; shake = 12;
                    floatTexts.push({x: birdX, y: birdY, text: "撕!", life: 30, color: "#D2691E"});
                    createParticles(birdX+30, birdY+12, "#8B4513", 15); playSound(120, 'sawtooth', 0.2, 0.2);
                }
                else if (timers.mo > 0) {
                    p.x = -200; p.passed = true; score += 3; shake = 15;
                    floatTexts.push({x: birdX, y: birdY, text: "弑!", life: 30, color: "#f00"});
                    createParticles(birdX+30, birdY+12, "#700", 20); playSound(100, 'sawtooth', 0.2, 0.3);
                }
                else if (timers.e > 0) { p.x = -200; p.passed = true; score += 5; shake = 10; createParticles(birdX+30, birdY+12, "#000", 15); playSound(150, 'square', 0.2, 0.2); }
                else if (timers.rage > 0) { p.x = -200; p.passed = true; score += 2; shake = 15; createParticles(birdX+30, birdY+12, "#f00", 15); }
                else if (timers.yao > 0 || timers.ghost > 0) { }
                else if (timers.sprint > 0 || timers.invinc > 0 || timers.immortal > 0 || timers.buddha > 0 || COLOR_PALETTE[birdColorIndex] === p.color) {
                    if(COLOR_PALETTE[birdColorIndex] !== p.color && !p.passed) { p.x = -100; p.passed = true; score++; }
                } else { gameOver = true; playSound(100, 'square', 0.3); }
            }
            if (!p.passed && p.x + 50 < birdX) {
                p.passed = true; combo = (p.color === lastPipeColor) ? combo + 1 : 1;
                lastPipeColor = p.color; 
                let bonus = (timers.dao > 0 ? combo * 5 : (timers.ling > 0 ? 3 : 0));
                score += (timers.yao > 0 ? combo * 2 : combo) + bonus;
                if(bonus > 0) floatTexts.push({x: birdX, y: birdY-20, text: timers.dao>0?"+天道":"+灵", life: 30, color: timers.dao>0?"#fff":"#00FBFF"});
            }
            if (p.x < -60) pipes.splice(i, 1);
        });

        powerItems.forEach((item, i) => {
            item.x -= (timers.freeze > 0) ? 0 : 1.4 * step;
            if (timers.shan > 0) {
                let dx = birdX - item.x, dy = birdY - item.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 180) { item.x += dx * 0.15; item.y += dy * 0.15; }
            }
            ctx.save(); ctx.translate(item.x, item.y); ctx.rotate(frame * 0.05);
            if(item.type === 'kanji') {
                ctx.fillStyle = (item.char === '道') ? "#fff" : (item.char === '魔' || item.char === '兽' ? "#1e0000" : (item.char === '灵' ? "#003333" : "rgba(255,255,255,0.8)")); 
                ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
                if(item.char === '道') { ctx.fillStyle="#000"; ctx.beginPath(); ctx.arc(0,0,12,Math.PI*0.5,Math.PI*1.5); ctx.fill(); }
                ctx.fillStyle = item.color; ctx.font = "bold 14px serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.rotate(-frame*0.05); ctx.fillText(item.char, 0, 0);
            } else {
                ctx.fillStyle = item.type==='muyu'?"#8d6e63":item.type==='star'?"#ff0":"#fff";
                ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
            }
            ctx.restore();
            if (Math.hypot(birdX + 16 - item.x, birdY + 12 - item.y) < 25) {
                if(item.type === 'kanji') timers[item.effect] = DURATION;
                else {
                    if(item.type === 'muyu') timers.muyu = DURATION;
                    if(item.type === 'star') timers.invinc = DURATION;
                    if(item.type === 'bolt') timers.sprint = 150;
                    if(item.type === 'bomb') pipes.forEach(p => { if(!p.passed) { p.x = -100; p.passed = true; score++; }});
                }
                powerItems.splice(i, 1); playSound(400, 'sine', 0.2);
            }
        });

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02; ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            if(p.life <= 0) particles.splice(i, 1);
        });

        birdHistory.push({x: birdX, y: birdY}); if(birdHistory.length > 15) birdHistory.shift();
        if(timers.yao > 0 || timers.mo > 0 || timers.shou > 0 || timers.ling > 0 || timers.dao > 0) {
            birdHistory.forEach((pos, idx) => {
                ctx.save(); ctx.globalAlpha = idx/35; ctx.translate(pos.x+16, pos.y+12);
                ctx.fillStyle = timers.dao > 0 ? "#fff" : (timers.ling > 0 ? "#00FBFF" : (timers.mo > 0 ? "#400" : (timers.shou > 0 ? "#8B4513" : "#A020F0"))); 
                ctx.fillRect(-16, -12, 32, 24); ctx.restore();
            });
        }

        ctx.save(); ctx.translate(birdX + 16, birdY + 12);
        // “道”态特效：太极旋转阵
        if (timers.dao > 0) {
            ctx.save(); ctx.rotate(frame * 0.1); ctx.lineWidth = 2;
            ctx.strokeStyle = "#fff"; ctx.beginPath(); ctx.arc(0,0,40,0,Math.PI); ctx.stroke();
            ctx.strokeStyle = "#000"; ctx.beginPath(); ctx.arc(0,0,40,Math.PI,Math.PI*2); ctx.stroke();
            ctx.restore();
        }
        
        if (timers.ling > 0) { ctx.globalAlpha = 0.6; ctx.scale(1.1, 1.1); }
        else if (timers.shou > 0 || timers.mo > 0) ctx.scale(1.5, 1.5);
        else if (timers.immortal > 0) ctx.scale(1.8, 1.8);
        else if (timers.e > 0) { ctx.scale(1.4, 1.4); ctx.shadowBlur = 20; ctx.shadowColor = "#000"; }
        if (timers.shan > 0) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, 35+Math.sin(frame*0.2)*5, 0, Math.PI*2); ctx.stroke(); }
        if (timers.rage > 0) ctx.scale(1.2, 1.2);

        if (userFaceImg) {
            ctx.save(); ctx.beginPath(); ctx.rect(-16, -12, 32, 24); ctx.clip();
            ctx.drawImage(userFaceImg, -16, -12, 32, 24); ctx.restore();
            if(timers.dao > 0 || timers.ling > 0 || timers.buddha > 0 || timers.e > 0 || timers.mo > 0 || timers.shou > 0) { 
                ctx.strokeStyle = timers.dao > 0 ? "#fff" : (timers.ling > 0 ? "#00FBFF" : (timers.mo > 0 ? "#f00" : (timers.shou > 0 ? "#D2691E" : (timers.e > 0 ? "#000" : "#ffd700")))); 
                ctx.lineWidth = 3; ctx.strokeRect(-16, -12, 32, 24); 
            }
        } else {
            ctx.fillStyle = timers.dao > 0 ? "#fff" : (timers.ling > 0 ? "#00FBFF" : (timers.shou > 0 ? "#D2691E" : (timers.mo > 0 ? "#600" : (timers.e > 0 ? "#000" : (timers.shan > 0 ? "#fff" : (timers.yao > 0 ? "#A020F0" : COLOR_PALETTE[birdColorIndex]))))));
            if (timers.buddha > 0) { ctx.fillStyle = "#FFD700"; ctx.shadowBlur = 15; ctx.shadowColor = "#FFD700"; }
            ctx.fillRect(-16, -12, 32, 24);
        }
        ctx.restore();

        if (!gameOver) {
            if (timers.sprint > 0) { birdY += (240 - birdY) * 0.1; }
            else { 
                let gravity = (timers.dao > 0 ? 0.12 : (timers.ling > 0 ? 0.12 : (timers.light > 0 ? 0.08 : 0.18)));
                velocity += gravity; birdY += velocity; 
            }
            frame++; if (frame % 110 === 0) createPipe();
        }

        if (birdY > LOGICAL_HEIGHT || birdY < 0) {
            if (timers.dao > 0 || timers.ling > 0 || timers.shou > 0 || timers.mo > 0 || timers.buddha > 0 || timers.immortal > 0 || timers.e > 0 || timers.yao > 0) { birdY = Math.max(0, Math.min(LOGICAL_HEIGHT, birdY)); velocity = 0; }
            else gameOver = true;
        }
        ctx.fillStyle = "#fff"; ctx.font = "bold 40px Arial"; ctx.textAlign = "center"; ctx.fillText(score, LOGICAL_WIDTH/2, 80);
        floatTexts.forEach((ft, i) => {
            ctx.fillStyle = ft.color; ctx.font = "bold 16px Arial"; ctx.fillText(ft.text, ft.x, ft.y); ft.y -= 1; ft.life--;
            if(ft.life <= 0) floatTexts.splice(i, 1);
        });
        if (gameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,LOGICAL_WIDTH, LOGICAL_HEIGHT);
            ctx.fillStyle = "#fff"; ctx.font = "20px Arial"; ctx.fillText("修行中断 - 点击重开", LOGICAL_WIDTH/2, 240);
            if(score > (localStorage.getItem('pixelBirdHighScore')||0)) localStorage.setItem('pixelBirdHighScore', score);
        } else { ctx.restore(); requestAnimationFrame(draw); }
    }

    const handleInput = (e) => {
        if(e.target.id === 'upload-btn' || e.target.id === 'faceInput') return;
        if(e.type === 'touchstart') e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const x = (clientX - rect.left) * (LOGICAL_WIDTH / rect.width);
        handleAction(x > LOGICAL_WIDTH / 2);
    };

    canvas.addEventListener('touchstart', handleInput, {passive: false});
    canvas.addEventListener('mousedown', handleInput);
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); handleAction(false); }
        if (e.code === 'Enter') { e.preventDefault(); handleAction(true); }
    });
    function resize() { canvas.width = LOGICAL_WIDTH; canvas.height = LOGICAL_HEIGHT; }
    window.addEventListener('resize', resize); resize(); reset(); draw();
};</script></body></html>
