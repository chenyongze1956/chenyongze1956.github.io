
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * { -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; box-sizing: border-box; }
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff); 
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            overflow: hidden; font-family: "STKaiti", "KaiTi", serif;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }
        #game-container { position: relative; width: 100%; height: 100%; max-width: 500px; max-height: 900px; display: flex; justify-content: center; align-items: center; }
        canvas { border: 4px solid rgba(255,255,255,0.8); border-radius: 20px; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); width: 95%; height: auto; aspect-ratio: 2 / 3; image-rendering: pixelated; }
        .info { position: absolute; top: 40px; color: #fff; text-align: center; width: 100%; pointer-events: none; }
        #hiScore { font-size: 24px; font-weight: 900; text-shadow: 0 0 10px #fff; }
        
        #upload-btn { 
            position: absolute; top: 15px; left: 25px; z-index: 100;
            background: rgba(255,255,255,0.2); color: white; 
            width: 34px; height: 34px; display: flex; justify-content: center; align-items: center;
            border-radius: 50%; font-size: 16px; cursor: pointer; border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(2px);
        }
        #faceInput { display: none; }
        #next-hint { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px; border: 2px solid #fff; }
        #next-color-box { width: 30px; height: 30px; border-radius: 5px; }
        #power-ui { position: absolute; bottom: 12%; width: 60%; height: 12px; background: rgba(0,0,0,0.6); border-radius: 6px; border: 2px solid #fff; overflow: hidden; display: none; }
        #power-bar { width: 100%; height: 100%; }
        .tips { position: absolute; bottom: 20px; color: rgba(255,255,255,0.7); font-size: 12px; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>
    <div id="game-container">
        <label id="upload-btn" for="faceInput" title="更换头像">📷</label>
        <input type="file" id="faceInput" accept="image/*">
        <div class="info"><div id="hiScore">HI: 0</div></div>
        <div id="next-hint"><div id="next-color-box"></div></div>
        <div id="power-ui"><div id="power-bar"></div></div>
        <canvas id="birdCanvas"></canvas>
        <div class="tips">左侧:跳跃 | 右侧:变色/功能触发</div>
    </div>
<script>
window.onload = function() {
    const canvas = document.getElementById('birdCanvas');
    const ctx = canvas.getContext('2d');
    const hiScoreEl = document.getElementById('hiScore');
    const nextBox = document.getElementById('next-color-box');
    const powerUI = document.getElementById('power-ui');
    const powerBar = document.getElementById('power-bar');
    const faceInput = document.getElementById('faceInput');

    const LOGICAL_WIDTH = 320, LOGICAL_HEIGHT = 480;
    const COLOR_PALETTE = ['#FF3333', '#FFAC33', '#FFEA33', '#33FF57', '#33DBFF', '#B533FF'];
    
    let birdColorIndex = 2, birdY, birdX, velocity, score, pipes, frame, gameOver;
    let combo = 0, lastPipeColor = '', scoreScale = 1;
    let powerItems = [], particles = [], floatTexts = [];
    
    // 状态计时器
    let invincTimer = 0, sprintTimer = 0, muyuTimer = 0, freezeTimer = 0, lightTimer = 0, buddhaTimer = 0;
    let ghostTimer = 0, immortalTimer = 0; // 新增鬼、仙计时器
    const DURATION = 300;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let userFaceImg = null;
    faceInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = () => userFaceImg = img;
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    function playSound(freq, type, duration, vol=0.08) {
        try {
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    function createParticles(x, y, color, count=10) {
        for(let i=0; i<count; i++) {
            particles.push({ x, y, color, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 1.0, size: Math.random()*3+1 });
        }
    }

    function reset() {
        birdY = 240; birdX = 50; velocity = 0; score = 0; combo = 0; 
        pipes = []; frame = 0; gameOver = false; powerItems = []; particles = []; floatTexts = [];
        invincTimer = 0; sprintTimer = 0; muyuTimer = 0; freezeTimer = 0; lightTimer = 0; buddhaTimer = 0;
        ghostTimer = 0; immortalTimer = 0;
        powerUI.style.display = 'none';
        hiScoreEl.innerText = "HI: " + (localStorage.getItem('pixelBirdHighScore') || 0);
        updateNextHint(); createPipe();
    }

    function updateNextHint() { nextBox.style.backgroundColor = COLOR_PALETTE[(birdColorIndex + 1) % COLOR_PALETTE.length]; }

    function createPipe() {
        const gap = 135; const h = Math.floor(Math.random() * (LOGICAL_HEIGHT - 280)) + 60;
        const pColor = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
        pipes.push({ x: LOGICAL_WIDTH, y: h, gap, passed: false, color: pColor });

        const rand = Math.random();
        const itemY = h + gap/2;
        
        // 道具生成表
        if (rand < 0.04) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'muyu' });
        else if (rand < 0.07) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'star' });
        else if (rand < 0.10) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'bolt' });
        else if (rand < 0.13) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'bomb' });
        else if (rand < 0.16) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '定', effect: 'freeze', color: '#33DBFF' });
        else if (rand < 0.19) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '轻', effect: 'light', color: '#33FF57' });
        else if (rand < 0.22) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '佛', effect: 'buddha', color: '#FFD700' });
        else if (rand < 0.25) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '鬼', effect: 'ghost', color: '#B0B0B0' });
        else if (rand < 0.28) powerItems.push({ x: LOGICAL_WIDTH + 20, y: itemY, type: 'kanji', char: '仙', effect: 'immortal', color: '#FF99CC' });
    }

    function handleAction(isRightSide) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (gameOver) { reset(); draw(); return; }
        if (isRightSide) {
            birdColorIndex = (birdColorIndex + 1) % COLOR_PALETTE.length;
            updateNextHint();
            if (muyuTimer > 0) {
                playSound(800, 'sine', 0.1, 0.4); score += 2;
                floatTexts.push({x: birdX, y: birdY, text: "功德+2", life: 40, color: "#ffd700"});
                createParticles(birdX+40, birdY+12, "#ffd700", 5);
                for(let p of pipes) { if(!p.passed && p.x > birdX) { p.x = -100; p.passed = true; break; } }
            } else { playSound(600, 'triangle', 0.05); }
        } else {
            if (sprintTimer === 0) {
                velocity = (lightTimer > 0) ? -2.2 : -3.5;
                playSound(300, 'sine', 0.1);
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
        let step = 1.0; if (sprintTimer > 0) step = 3.5; if (freezeTimer > 0) step = 0;

        const activeTimer = Math.max(invincTimer, sprintTimer, muyuTimer, freezeTimer, lightTimer, buddhaTimer, ghostTimer, immortalTimer);
        if (activeTimer > 0) {
            powerUI.style.display = 'block';
            powerBar.style.width = (activeTimer / DURATION * 100) + '%';
            // 计时递减逻辑
            if (ghostTimer > 0) { ghostTimer--; powerBar.style.background = "#B0B0B0"; }
            else if (immortalTimer > 0) { immortalTimer--; powerBar.style.background = "#FF99CC"; }
            else if (buddhaTimer > 0) { buddhaTimer--; powerBar.style.background = "#FFD700"; }
            else if (sprintTimer > 0) { sprintTimer--; powerBar.style.background = "#fff"; }
            else if (invincTimer > 0) { invincTimer--; powerBar.style.background = "#ff0"; }
            else if (muyuTimer > 0) { muyuTimer--; powerBar.style.background = "#ffd700"; }
            else if (freezeTimer > 0) { freezeTimer--; powerBar.style.background = "#33DBFF"; }
            else if (lightTimer > 0) { lightTimer--; powerBar.style.background = "#33FF57"; }
        } else { powerUI.style.display = 'none'; }

        // 道具渲染与碰撞
        powerItems.forEach((item, i) => {
            item.x -= (freezeTimer > 0) ? 0 : 1.4 * step;
            ctx.save(); ctx.translate(item.x, item.y); ctx.rotate(frame * 0.05);
            if(item.type === 'kanji') {
                ctx.scale(1.2, 1.2); ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = item.color; ctx.font = "bold 14px serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.rotate(-frame*0.05); ctx.fillText(item.char, 0, 0);
            } else {
                ctx.fillStyle = item.type==='muyu'?"#8d6e63":item.type==='star'?"#ff0":"#fff";
                ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
            }
            ctx.restore();
            if (Math.hypot(birdX + 16 - item.x, birdY + 12 - item.y) < 25) {
                if(item.type === 'kanji') {
                    if(item.effect === 'freeze') freezeTimer = DURATION;
                    else if(item.effect === 'light') lightTimer = DURATION;
                    else if(item.effect === 'buddha') buddhaTimer = DURATION;
                    else if(item.effect === 'ghost') ghostTimer = DURATION;
                    else if(item.effect === 'immortal') immortalTimer = DURATION;
                    floatTexts.push({x: birdX, y: birdY, text: "言灵: " + item.char, life: 40, color: item.color});
                } else {
                    if(item.type === 'muyu') muyuTimer = DURATION;
                    if(item.type === 'star') invincTimer = DURATION;
                    if(item.type === 'bolt') sprintTimer = 150;
                    if(item.type === 'bomb') pipes.forEach(p => { if(!p.passed) { p.x = -100; p.passed = true; score++; }});
                }
                powerItems.splice(i, 1); playSound(400, 'sine', 0.2);
            }
        });

        // 粒子
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02; ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            if(p.life <= 0) particles.splice(i, 1);
        });

        // 主角绘制
        ctx.save(); ctx.translate(birdX + 16, birdY + 12);
        if (immortalTimer > 0) ctx.scale(1.8, 1.8);
        else if (sprintTimer > 0) ctx.scale(1.5, 0.8); 
        else ctx.rotate(velocity * 0.08);

        if (ghostTimer > 0) ctx.globalAlpha = 0.4; // 鬼状态半透明

        if (userFaceImg) {
            ctx.save(); ctx.beginPath(); ctx.rect(-16, -12, 32, 24); ctx.clip();
            ctx.drawImage(userFaceImg, -16, -12, 32, 24); ctx.restore();
            if (buddhaTimer > 0 || invincTimer > 0 || immortalTimer > 0) {
                ctx.strokeStyle = `hsl(${frame*10%360}, 100%, 50%)`; ctx.lineWidth = 3; ctx.strokeRect(-16, -12, 32, 24);
            }
        } else {
            ctx.fillStyle = (invincTimer > 0 || sprintTimer > 0 || immortalTimer > 0) ? `hsl(${frame*10%360}, 70%, 60%)` : COLOR_PALETTE[birdColorIndex];
            if (buddhaTimer > 0) { ctx.fillStyle = `hsl(${frame*5 % 60 + 40}, 100%, 60%)`; ctx.shadowBlur = 20; ctx.shadowColor = "#FFD700"; }
            ctx.fillRect(-16, -12, 32, 24);
        }
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.strokeRect(-16, -12, 32, 24);
        
        // 仙态拖尾
        if (immortalTimer > 0 && frame % 5 === 0) createParticles(-20, 0, "#FFCCFF", 2);
        ctx.restore(); ctx.globalAlpha = 1.0;

        // 逻辑更新
        if (!gameOver) {
            if (sprintTimer > 0) { birdY += (240 - birdY) * 0.1; } 
            else { velocity += (lightTimer > 0 ? 0.08 : 0.18); birdY += velocity; }
            frame++; if (frame % 110 === 0) createPipe();
            if (buddhaTimer > 0 && frame % 10 === 0) { score++; createParticles(birdX+40, birdY, "#FFD700", 2); }
        }

        // 水管渲染
        pipes.forEach((p, i) => {
            if (freezeTimer <= 0) p.x -= 1.4 * step;
            ctx.globalAlpha = (buddhaTimer > 0 || ghostTimer > 0) ? 0.3 : 1.0;
            ctx.fillStyle = p.color; ctx.fillRect(p.x, 0, 50, p.y); ctx.fillRect(p.x, p.y + p.gap, 50, LOGICAL_HEIGHT);
            ctx.globalAlpha = 1.0;

            // 碰撞检测
            let hit = (birdX + 26 > p.x && birdX < p.x + 46 && (birdY < p.y || birdY + 22 > p.y + p.gap || (COLOR_PALETTE[birdColorIndex] !== p.color && invincTimer <= 0 && sprintTimer <= 0 && buddhaTimer <= 0 && ghostTimer <= 0 && immortalTimer <= 0)));
            if (hit) {
                if (sprintTimer > 0 || invincTimer > 0 || buddhaTimer > 0 || immortalTimer > 0) { 
                    if(buddhaTimer === 0 && ghostTimer === 0) { p.x = -100; p.passed = true; score++; } 
                } else if (ghostTimer > 0) { /* 穿透 */ }
                else { gameOver = true; playSound(100, 'square', 0.3); }
            }
            if (!p.passed && p.x + 50 < birdX) {
                p.passed = true; combo = (p.color === lastPipeColor) ? combo + 1 : 1;
                lastPipeColor = p.color; score += combo; scoreScale = 1.3;
            }
            if (p.x < -60) pipes.splice(i, 1);
        });

        if (birdY > LOGICAL_HEIGHT || birdY < 0) {
            if(buddhaTimer > 0 || immortalTimer > 0) { birdY = Math.max(0, Math.min(LOGICAL_HEIGHT, birdY)); velocity = 0; }
            else gameOver = true;
        }

        // 分数
        ctx.save(); ctx.translate(LOGICAL_WIDTH/2, 80); ctx.scale(scoreScale, scoreScale);
        ctx.fillStyle = "#fff"; ctx.font = "bold 40px Arial"; ctx.textAlign = "center";
        ctx.fillText(score, 0, 0); ctx.restore(); if(scoreScale > 1) scoreScale -= 0.02;

        if (gameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,LOGICAL_WIDTH, LOGICAL_HEIGHT);
            ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "20px Arial";
            ctx.fillText("修行中断 - 点击重开", LOGICAL_WIDTH/2, 240);
        } else { requestAnimationFrame(draw); }
    }

    const handleInput = (e) => {
        if(e.target.id === 'upload-btn' || e.target.id === 'faceInput') return;
        if(e.type === 'touchstart') e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const x = (clientX - rect.left) * (LOGICAL_WIDTH / rect.width);
        handleAction(x > LOGICAL_WIDTH / 2);
    };

    canvas.addEventListener('touchstart', handleInput, {passive: false});
    canvas.addEventListener('mousedown', handleInput);
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); handleAction(false); }
        if (e.code === 'KeyC' || e.code === 'Enter') { e.preventDefault(); handleAction(true); }
    });
    function resize() { canvas.width = LOGICAL_WIDTH; canvas.height = LOGICAL_HEIGHT; }
    window.addEventListener('resize', resize); resize(); reset(); draw();
};
</script>
</body>
</html>
