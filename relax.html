
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relax Chat & Crypto Dashboard</title>
    <style>
        /* 1. 基础布局与动态渐变背景 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 核心卡片容器 (玻璃拟态效果) */
        .dashboard-card {
            position: relative;
            width: 90%;
            max-width: 420px;
            height: 85vh;
            max-height: 700px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: cardAppear 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 3. 加密货币滚动条 */
        .crypto-ticker {
            background: rgba(255, 255, 255, 0.05);
            height: 40px;
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: tickerScroll 25s linear infinite;
        }

        @keyframes tickerScroll {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .coin-item {
            display: inline-block;
            margin-right: 35px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
        }

        .coin-symbol { color: #ffb700; }
        .coin-price { color: #00ff88; margin-left: 5px; }

        /* 4. 顶部标题栏 */
        .card-header {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
        }

        .live-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ff4646;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4646;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 5. iframe 样式 */
        #chat_embed {
            flex: 1;
            width: 100%;
            border: none;
            background: transparent;
        }

        /* 6. 移动端适配 */
        @media (max-width: 480px) {
            .dashboard-card { height: 80vh; width: 95%; }
            .coin-item { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="crypto-ticker">
            <div id="cryptoTicker" class="ticker-content">
                ⌛ 正在连接加密货币实时行情数据...
            </div>
        </div>

        <div class="card-header">
            <div class="live-tag">
                <div class="dot"></div>
                <span>LIVE CHAT: somjuu</span>
            </div>
            <div style="color: rgba(255,255,255,0.4); font-size: 11px; letter-spacing: 1px;">DASHBOARD V2.0</div>
        </div>

        <iframe
          id="chat_embed"
          src="https://www.twitch.tv/embed/somjuu/chat?parent=chenyongze1956.github.io&darkpopout"
          referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
    </div>

    <script>
        /**
         * 获取币安价格更新
         * 使用 allorigins 代理来解决国内网络屏蔽和 CORS 跨域问题
         */
        async function updateCryptoPrices() {
            const symbols = ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'DOGEUSDT', 'PEPEUSDT'];
            const targetUrl = 'https://api.binance.com/api/3/ticker/price';
            // 使用公共代理绕过网络封锁
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Proxy error');
                
                const data = await response.json();
                const filtered = data.filter(item => symbols.includes(item.symbol));
                const tickerEl = document.getElementById('cryptoTicker');
                
                const htmlContent = filtered.map(coin => {
                    const name = coin.symbol.replace('USDT', '');
                    const price = parseFloat(coin.price);
                    const displayPrice = price > 1 ? price.toLocaleString() : price.toFixed(6);
                    return `<span class="coin-item">
                                <span class="coin-symbol">${name}</span>
                                <span class="coin-price">$${displayPrice}</span>
                            </span>`;
                }).join('');
                
                // 重复内容以实现无缝滚动
                tickerEl.innerHTML = htmlContent + htmlContent; 
            } catch (error) {
                console.error('Crypto Fetch Error:', error);
                // 失败时尝试直连，作为最后的备选
                fetchDirectly();
            }
        }

        async function fetchDirectly() {
            try {
                const response = await fetch('https://api.binance.com/api/3/ticker/price');
                const data = await response.json();
                // ... 渲染逻辑同上 (简化处理)
            } catch (e) {
                document.getElementById('cryptoTicker').innerHTML = "⚠️ 行情获取失败，请确保全局代理开启";
            }
        }

        // 初始化执行
        updateCryptoPrices();
        // 每 60 秒刷新一次数据（防止代理请求过快被封）
        setInterval(updateCryptoPrices, 60000);
    </script>
</body>
</html>
