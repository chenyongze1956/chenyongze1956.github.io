
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZEN Dashboard Pro</title>
    <style>
        :root { 
            --accent: #00ff88; 
            --glass: rgba(0, 0, 0, 0.8); 
            --border: rgba(255, 255, 255, 0.08);
        }

        /* 基础重置 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #000;
        }

        /* 响应式全屏渐变背景 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            /* 动态视口高度修复移动端白边 */
            height: 100svh; 
            background: linear-gradient(45deg, #ff7e5f, #feb47b, #ffed86, #9feb8f, #5fbfff, #9b8eff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 磨砂玻璃卡片 */
        .dashboard-card {
            width: 100%;
            max-width: 600px;
            /* 桌面端高度 90%，移动端 100% */
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        /* 头部时钟 */
        .zen-header { 
            padding: 15px; 
            text-align: center; 
            color: white; 
            border-bottom: 1px solid var(--border); 
        }
        #time-display { 
            font-size: 2.2rem; 
            font-weight: 200; 
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff 40%, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #date-display { 
            font-size: 0.65rem; 
            letter-spacing: 3px; 
            color: #888; 
            text-transform: uppercase; 
            margin-top: 4px; 
        }

        /* 主体布局 */
        .main-content { 
            flex: 1; 
            display: flex; 
            overflow: hidden; 
            position: relative; 
        }

        /* 左侧语录：移动端缩窄 */
        .quote-sidebar { 
            width: 50px; 
            padding: 10px; 
            border-right: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            writing-mode: vertical-rl; 
            cursor: pointer;
            transition: background 0.2s;
        }
        .quote-sidebar:hover { background: rgba(255,255,255,0.03); }
        #quote-text { font-size: 0.8rem; color: #ccc; opacity: 0.8; letter-spacing: 3px; }

        /* Twitch 容器 */
        .iframe-container { flex: 1; background: #000; position: relative; }
        #chat_embed { width: 100%; height: 100%; border: none; }

        /* 桌面行情侧栏 */
        .crypto-sidebar { 
            width: 70px; 
            border-left: 1px solid var(--border); 
            background: rgba(0,0,0,0.3); 
            overflow: hidden; 
        }
        .ticker-v-wrap { display: flex; flex-direction: column; animation: vTicker 20s linear infinite; }
        .ticker-v-wrap:hover { animation-play-state: paused; }
        @keyframes vTicker { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        
        .v-coin-item { 
            padding: 20px 0; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
        }

        /* 移动端底部行情 */
        .mobile-footer-ticker { 
            display: none; 
            height: 40px; 
            background: rgba(0,0,0,0.6); 
            border-top: 1px solid var(--border); 
            overflow: hidden; 
            align-items: center;
        }
        .ticker-h-wrap { 
            white-space: nowrap; 
            animation: hTicker 25s linear infinite; 
            display: inline-block; 
        }
        @keyframes hTicker { 0% { transform: translateX(10%); } 100% { transform: translateX(-100%); } }

        /* 行情通用样式 */
        .symbol { display: block; font-size: 10px; color: #666; font-weight: 800; }
        .price { display: block; font-size: 11px; color: var(--accent); writing-mode: vertical-rl; margin: 5px auto 0; font-family: monospace; }
        .h-item { display: inline-block; margin-right: 35px; color: var(--accent); font-family: monospace; font-size: 13px; }
        .h-symbol { color: #888; font-size: 10px; margin-right: 6px; font-weight: bold; }

        /* 响应式适配方案 */
        @media (max-width: 768px) {
            .dashboard-card { height: 100svh; max-width: 100%; border: none; }
            .crypto-sidebar { display: none; }
            .mobile-footer-ticker { display: flex; }
            .quote-sidebar { width: 40px; }
            #time-display { font-size: 1.8rem; }
            #quote-text { font-size: 0.7rem; }
        }

        /* 隐藏的快捷点 */
        .douban-dot { 
            position: fixed; bottom: 60px; left: 15px; 
            width: 8px; height: 8px; 
            background: #42bd56; border-radius: 50%; 
            opacity: 0.3; z-index: 999; 
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <!-- 头部 -->
        <header class="zen-header">
            <div id="time-display">00:00</div>
            <div id="date-display">LOADING...</div>
        </header>

        <!-- 主体 -->
        <main class="main-content">
            <section class="quote-sidebar" onclick="updateQuote()">
                <div id="quote-text">...</div>
            </section>

            <div class="iframe-container">
                <!-- 动态获取 Parent 域名防止报错 -->
                <iframe id="chat_embed" src="" referrerpolicy="strict-origin-when-cross-origin"></iframe>
            </div>

            <aside class="crypto-sidebar">
                <div class="ticker-v-wrap" id="tickerV"></div>
            </aside>
        </main>

        <!-- 移动端底栏 -->
        <footer class="mobile-footer-ticker">
            <div class="ticker-h-wrap" id="tickerH"></div>
        </footer>
    </div>

    <a href="https://movie.douban.com" target="_blank" class="douban-dot"></a>

    <script>
        // 1. 自动适配 Twitch Parent 域名
        const currentDomain = window.location.hostname || "localhost";
        document.getElementById('chat_embed').src = `https://www.twitch.tv/embed/velvet_7/chat?parent=${currentDomain}&darkpopout`;

        // 2. 高精度时钟
        function updateTime() {
            const now = new Date();
            document.getElementById('time-display').textContent = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
            
            document.getElementById('date-display').textContent = 
                now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 3. 语录库
        const quotes = [
            "大道至简，悟在天成。", "心外无物，闲看花开。", 
            "Stay hungry, Stay foolish.", "静中见真境，淡中识本然。", 
            "博观而约取，厚积而薄发。", "流水不争先，争的是滔滔不绝。", 
            "行到水穷处，坐看云起时。", "纵有疾风起，人生不言弃。"
        ];
        function updateQuote() {
            const el = document.getElementById('quote-text');
            el.style.transition = 'opacity 0.4s';
            el.style.opacity = 0;
            setTimeout(() => {
                el.textContent = quotes[Math.floor(Math.random() * quotes.length)];
                el.style.opacity = 0.8;
            }, 400);
        }
        updateQuote();

        // 4. 加密货币行情 (增加缓存处理防止频率限制)
        async function getPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin,dogecoin&vs_currencies=usd');
                if (!response.ok) throw new Error('API Rate Limit');
                const data = await response.json();
                const coins = [
                    { id: 'BTC', p: data.bitcoin.usd },
                    { id: 'ETH', p: data.ethereum.usd },
                    { id: 'SOL', p: data.solana.usd },
                    { id: 'BNB', p: data.binancecoin.usd },
                    { id: 'DOGE', p: data.dogecoin.usd }
                ];
                renderTickers(coins);
            } catch (e) {
                console.error("Price fetch throttled");
            }
        }

        function renderTickers(coins) {
            const vHtml = coins.map(c => `
                <div class="v-coin-item">
                    <span class="symbol">${c.id}</span>
                    <span class="price">$${Math.round(c.p).toLocaleString()}</span>
                </div>
            `).join('');
            document.getElementById('tickerV').innerHTML = vHtml + vHtml; // 双倍内容实现无缝滚动

            const hHtml = coins.map(c => `
                <span class="h-item"><span class="h-symbol">${c.id}</span>$${c.p.toLocaleString()}</span>
            `).join('');
            document.getElementById('tickerH').innerHTML = hHtml + hHtml + hHtml;
        }

        getPrices();
        setInterval(getPrices, 60000); // 1分钟更新一次，避免被封IP
    </script>
</body>
</html>
