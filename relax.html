<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relax Chat & Crypto Dashboard</title>
    <style>
        /* 1. 基础布局与动态渐变背景 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
        }

        body {
            /* 动态流光背景 */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 核心卡片容器 (玻璃拟态效果) */
        .dashboard-card {
            position: relative;
            width: 90%;
            max-width: 420px;
            height: 85vh;
            max-height: 700px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: cardAppear 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 3. 加密货币滚动条 (Ticker) */
        .crypto-ticker {
            background: rgba(255, 255, 255, 0.05);
            height: 40px;
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: tickerScroll 25s linear infinite;
        }

        @keyframes tickerScroll {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .coin-item {
            display: inline-block;
            margin-right: 30px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
        }

        .coin-symbol { color: #ffb700; }
        .coin-price { color: #00ff88; margin-left: 4px; }

        /* 4. 顶部标题栏 */
        .card-header {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
        }

        .live-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ff4646;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4646;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 5. iframe 样式 */
        #chat_embed {
            flex: 1;
            width: 100%;
            border: none;
            background: transparent;
        }

        /* 6. 响应式调整 */
        @media (max-width: 480px) {
            .dashboard-card { height: 80vh; }
            .coin-item { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="crypto-ticker">
            <div id="cryptoTicker" class="ticker-content">
                🚀 行情加载中... BTC ETH BNB SOL DOGE
            </div>
        </div>

        <div class="card-header">
            <div class="live-tag">
                <div class="dot"></div>
                <span>Live Chat: ladyrebellium</span>
            </div>
            <div style="color: rgba(255,255,255,0.4); font-size: 11px;">Crypto: Binance Real-time</div>
        </div>

        <iframe
          id="chat_embed"
          src="https://www.twitch.tv/embed/ladyrebellium/chat?parent=chenyongze1956.github.io&darkpopout"
          referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
    </div>

    <script>
        // 获取币安行情数据
        async function updateCryptoPrices() {
            const symbols = ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'DOGEUSDT', 'PEPEUSDT'];
            try {
                const response = await fetch('https://api.binance.com/api/3/ticker/price');
                const data = await response.json();
                
                const filtered = data.filter(item => symbols.includes(item.symbol));
                const tickerEl = document.getElementById('cryptoTicker');
                
                // 格式化数据并拼接，重复两次以实现无缝滚动
                const htmlContent = filtered.map(coin => {
                    const name = coin.symbol.replace('USDT', '');
                    const price = parseFloat(coin.price);
                    // 根据价格大小决定保留几位小数
                    const displayPrice = price > 1 ? price.toLocaleString() : price.toFixed(6);
                    return `<span class="coin-item">
                                <span class="coin-symbol">${name}</span>
                                <span class="coin-price">$${displayPrice}</span>
                            </span>`;
                }).join('');
                
                tickerEl.innerHTML = htmlContent + htmlContent; 
            } catch (error) {
                console.error('Crypto API Error:', error);
            }
        }

        // 初始化
        updateCryptoPrices();
        // 每 30 秒更新一次数据
        setInterval(updateCryptoPrices, 30000);
    </script>
</body>
</html>
