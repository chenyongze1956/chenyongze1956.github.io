
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Dashboard V6 - Interactive</title>
    <style>

   
        
        :root { --accent: #00ff88; --glass: rgba(0, 0, 0, 0.8); }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            display: flex; justify-content: center; align-items: center;

 background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff);   
        }

        body::before {
            content: ''; position: absolute; width: 150%; height: 150%;
 background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff);   
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .dashboard-card {
            width: 95%; max-width: 500px; height: 90vh;
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 40px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* 顶部时钟 */
        .zen-header { padding: 15px 20px; text-align: center; color: white; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #time-display { font-size: 2rem; font-weight: 100; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #date-display { font-size: 0.6rem; letter-spacing: 2px; color: #666; text-transform: uppercase; }

        .main-content { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* 左侧语录栏 - 增加点击手势 */
        .quote-sidebar { 
            width: 50px; padding: 15px 5px; 
            border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; 
            writing-mode: vertical-rl; text-orientation: mixed; 
            cursor: pointer; transition: background 0.3s;
        }
        .quote-sidebar:hover { background: rgba(255,255,255,0.03); }
        
        #quote-text { 
            font-size: 0.75rem; color: #aaa; font-style: italic; 
            opacity: 0.7; line-height: 1.4; letter-spacing: 2px; 
            transition: opacity 0.4s ease; /* 动画核心 */
        }

        /* 中间 Twitch */
        #chat_embed { flex: 1; border: none; opacity: 0.9; }

        /* 右侧纵向跑马灯行情栏 */
        .crypto-sidebar { 
            width: 70px; 
            border-left: 1px solid rgba(255,255,255,0.05); 
            background: rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        .ticker-wrap {
            display: flex;
            flex-direction: column;
            animation: verticalTicker 25s linear infinite;
        }

        .crypto-sidebar:hover .ticker-wrap { animation-play-state: paused; }

        @keyframes verticalTicker {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .side-coin { 
            padding: 25px 0;
            text-align: center; 
            font-family: monospace;
        }
        .side-symbol { display: block; font-size: 11px; color: #fff; font-weight: bold; margin-bottom: 5px; opacity: 0.6; }
        .side-price { 
            display: block; 
            font-size: 12px; 
            color: var(--accent); 
            writing-mode: vertical-rl; 
            text-orientation: sideways;
            margin: 0 auto;
        }

        /* 底部豆瓣小点 */
        .douban-dot {
            position: absolute; bottom: 20px; left: 20px;
            width: 6px; height: 6px; background: #42bd56; border-radius: 50%;
            cursor: pointer; opacity: 0.3; transition: 0.3s; z-index: 100;
        }
        .douban-dot:hover { opacity: 1; transform: scale(1.5); }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <div class="zen-header">
            <div id="time-display">00:00</div>
            <div id="date-display">LOADING</div>
        </div>

        <div class="main-content">
            <!-- 左侧语录栏 -->
            <div class="quote-sidebar" onclick="updateQuote()">
                <div id="quote-text">载入智慧中...</div>
            </div>

            <!-- 中间内容 -->
            <iframe id="chat_embed" src="https://www.twitch.tv/embed/velvet_7/chat?parent=chenyongze1956.github.io&darkpopout" referrerpolicy="strict-origin-when-cross-origin"></iframe>

            <!-- 右侧跑马灯 -->
            <div class="crypto-sidebar">
                <div class="ticker-wrap" id="cryptoTicker">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>
    </div>

    <a href="https://movie.douban.com" target="_blank" class="douban-dot" title="前往豆瓣"></a>

    <script>
        // 1. 时钟
        function updateZenTime() {
            const now = new Date();
            document.getElementById('time-display').innerText = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            const options = { month: 'short', day: 'numeric', weekday: 'short' };
            document.getElementById('date-display').innerText = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateZenTime, 1000);
        updateZenTime();

        // 2. 随机名人语录库
        const quotes = [
            "大道至简，悟在天成。",
            "心外无物，闲看花开。",
            "Stay hungry, Stay foolish.",
            "静中见真境，淡中识本然。",
            "博观而约取，厚积而薄发。",
            "流水不争先，争的是滔滔不绝。",
            "行到水穷处，坐看云起时。",
            "纵有疾风起，人生不言弃。",
            "凡是过往，皆为序章。"
        ];

        function updateQuote() {
            const el = document.getElementById('quote-text');
            el.style.opacity = 0; // 淡出
            
            setTimeout(() => {
                let newQuote;
                // 避免连续抽中同一句
                do {
                    newQuote = quotes[Math.floor(Math.random() * quotes.length)];
                } while (newQuote === el.innerText);
                
                el.innerText = newQuote;
                el.style.opacity = 0.7; // 淡入
            }, 400);
        }
        updateQuote();
        setInterval(updateQuote, 60000); // 每分钟自动换一次

        // 3. 行情数据
        async function getPrices() {
            const ticker = document.getElementById('cryptoTicker');
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin,dogecoin,ripple&vs_currencies=usd');
                const data = await response.json();
                const coins = [
                    { id: 'BTC', p: data.bitcoin.usd },
                    { id: 'ETH', p: data.ethereum.usd },
                    { id: 'SOL', p: data.solana.usd },
                    { id: 'BNB', p: data.binancecoin.usd },
                    { id: 'DOGE', p: data.dogecoin.usd },
                    { id: 'XRP', p: data.ripple.usd }
                ];
                
                const content = coins.map(c => `
                    <div class="side-coin">
                        <span class="side-symbol">${c.id}</span>
                        <span class="side-price">$${c.p.toLocaleString()}</span>
                    </div>
                `).join('');
                
                ticker.innerHTML = content + content;
            } catch (e) {
                ticker.innerHTML = "<div style='color:#555;padding:20px;font-size:10px;'>OFFLINE</div>";
            }
        }
        getPrices();
        setInterval(getPrices, 180000);
    </script>
</body>
</html>
