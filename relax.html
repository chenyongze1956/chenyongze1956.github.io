
<style>
    /* 1. 确保基础标签占满全屏，消除默认边距 */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%; /* 必须设置高度 */
        overflow: hidden; /* 防止出现滚动条 */
    }

    body {
        /* 背景色直接给到 body */
        background: linear-gradient(45deg, #ff7e5f, #feb47b, #ffed86, #9feb8f, #5fbfff, #9b8eff);
        background-size: 400% 400%; /* 让渐变更柔和 */
        display: flex;
        justify-content: center; /* 水平居中 */
        align-items: center;     /* 垂直居中核心：在 flex 容器中垂直对齐 */
    }

    /* 2. 容器样式 */
    .chat-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding: 20px;
        box-sizing: border-box;
    }

    /* 3. 聊天框样式：响应式核心 */
    #chat_embed {
        width: 100%;
        max-width: 400px; 
        height: 80vh; /* 使用 vh 单位，代表屏幕高度的 80%，自适应更好 */
        max-height: 600px; /* 设置最大高度防止太长 */
        
        border: none;
        border-radius: 20px; /* 圆角加大一点更精致 */
        box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* 深色阴影增加悬浮感 */
        background: rgba(255, 255, 255, 0.1); /* 预留一个半透明底色，加载前不突兀 */
        backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
    }

    /* 4. 针对小屏幕手机的微调 */
    @media (max-width: 480px) {
        .chat-container {
            padding: 10px;
        }
        #chat_embed {
            height: 70vh; /* 手机端高度稍微降低，留出视觉空间 */
        }
    }
</style>

<div class="chat-container">
    <iframe
      id="chat_embed"
      src="https://www.twitch.tv/embed/somjuu/chat?parent=chenyongze1956.github.io"
      referrerpolicy="strict-origin-when-cross-origin">
    </iframe>
</div>
