
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relax Dashboard V3</title>
    <style>
        /* 基础样式保持不变，确保美观 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; align-items: center;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .dashboard-card {
            width: 90%; max-width: 420px; height: 85vh; max-height: 700px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* 滚动条样式 */
        .crypto-ticker {
            background: rgba(255, 255, 255, 0.05); height: 40px;
            display: flex; align-items: center; overflow: hidden; white-space: nowrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .ticker-content { display: inline-block; animation: tickerScroll 30s linear infinite; padding-left: 100%; }
        @keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .coin-item { display: inline-block; margin-right: 40px; font-family: monospace; font-size: 14px; }
        .coin-symbol { color: #ffb700; font-weight: bold; }
        .coin-price { color: #00ff88; margin-left: 5px; }

        .card-header { padding: 12px 20px; display: flex; align-items: center; background: rgba(255, 255, 255, 0.03); color: white; font-size: 12px; }
        .dot { width: 8px; height: 8px; background: #ff4646; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px #ff4646; }
        
        #chat_embed { flex: 1; width: 100%; border: none; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="crypto-ticker">
            <div id="cryptoTicker" class="ticker-content">
                🚀 正在尝试连接全球行情数据源...
            </div>
        </div>

        <div class="card-header">
            <div class="dot"></div>
            <span>LIVE CHAT: somjuu</span>
        </div>

        <iframe
          id="chat_embed"
          src="https://www.twitch.tv/embed/velvet_7/chat?parent=chenyongze1956.github.io&darkpopout"
          referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
    </div>

    <script>
        // 使用 CoinGecko API (通常对浏览器 fetch 更友好)
        async function getPrices() {
            const tickerEl = document.getElementById('cryptoTicker');
            try {
                // 获取 BTC, ETH, SOL, BNB, DOGE 的价格
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,solana,dogecoin&vs_currencies=usd');
                
                if (!response.ok) throw new Error('API 响应异常');
                
                const data = await response.json();
                
                const coins = [
                    { name: 'BTC', price: data.bitcoin.usd },
                    { name: 'ETH', price: data.ethereum.usd },
                    { name: 'BNB', price: data.binancecoin.usd },
                    { name: 'SOL', price: data.solana.usd },
                    { name: 'DOGE', price: data.dogecoin.usd }
                ];

                const html = coins.map(c => `
                    <span class="coin-item">
                        <span class="coin-symbol">${c.name}</span>
                        <span class="coin-price">$${c.price.toLocaleString()}</span>
                    </span>
                `).join('');

                tickerEl.innerHTML = html + html; // 双倍内容实现无缝滚动
                console.log("行情更新成功:", new Date().toLocaleTimeString());

            } catch (error) {
                console.error("获取失败:", error);
                tickerEl.innerHTML = "⚠️ 行情数据暂时无法获取，请检查网络连接";
            }
        }

        // 立即执行
        getPrices();
        // 每 2 分钟更新一次 (CoinGecko 免费版频率限制较严，不要太快)
        setInterval(getPrices, 120000);
    </script>
</body>
</html>
