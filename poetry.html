
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        /* 1. 全屏流動漸變背景 */
        body {
            margin: 0; padding: 0;
            background: linear-gradient(45deg, #ff7e5f, #feb47b, #ffed86, #9feb8f, #5fbfff, #9b8eff);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: "STKaiti", "KaiTi", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: manipulation;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 響應式尺寸 */
        :root {
            --cell-size: 55px;
            --font-size: 1.8rem;
        }

        @media screen and (max-width: 500px) {
            :root {
                --cell-size: 45px;
                --font-size: 1.5rem;
            }
            .title-h1 { font-size: 2.2rem !important; }
        }

        /* 3. 織錦外框與格子 */
        .brocade-frame {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border: 8px double #b89150;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            border-radius: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, var(--cell-size));
            gap: 2px;
            background-color: rgba(184, 145, 80, 0.3);
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            font-size: var(--font-size);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            color: #2c3e50;
        }

        .cell:hover {
            background: #8c2727;
            color: white !important;
            transform: scale(1.1);
            z-index: 10;
        }

        .highlight-active {
            background: #fff9c4;
            color: #8c2727;
        }

        /* 4. 信息面板 */
        .info-panel {
            margin-top: 2rem;
            width: 90%;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .audio-wave {
            display: inline-block;
            margin-left: 8px;
            color: #ffed86;
        }
    </style>
</head>
<body>

    <div class="title-area text-center mb-6">
        <h1 class="title-h1 text-white text-4xl font-bold tracking-widest drop-shadow-lg">璇璣織錦</h1>
        <p class="text-white/80 italic mt-2 text-sm">錦字迴環 </p>
    </div>

    <div class="brocade-frame">
        <div id="matrix" class="grid"></div>
    </div>

    <div class="info-panel">
        <div class="flex items-center justify-center mb-2">
            <i class="fa fa-volume-up text-white/40 text-xs mr-2"></i>
            <span id="voice-status" class="text-[10px] text-white/40 uppercase tracking-widest">語音初始化中...</span>
        </div>
        <div id="output" class="text-2xl font-bold min-h-[1.5em] text-white">
            觸碰錦字，讀取迴環詩文
        </div>
    </div>

    <script>
        /**
         * 根據您提供的迴環詩文重新排列
         * 採用 7x4 矩陣適配您的原代碼邏輯
         */
        const xuanjiData = [
            "龍","虎","繁","文","藻","旗","凋",
            "華","曜","榮","容","飾","觀","壯",
            "麗","衣","繡","曜","顏","充","藻",
            "文","繁","虎","龍","榮","曜","華"
        ];

        const matrix = document.getElementById('matrix');
        const output = document.getElementById('output');
        const voiceStatus = document.getElementById('voice-status');
        const synth = window.speechSynthesis;
        let lastReadRow = -1;

        function getChineseVoice() {
            const allVoices = synth.getVoices();
            return allVoices.find(v => v.lang.includes('zh')) || allVoices[0];
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                const voice = getChineseVoice();
                if (voice) voiceStatus.innerText = "中文語音引擎已就緒";
            };
        }

        function speakText(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voice = getChineseVoice();
            if (voice) utterance.voice = voice;
            utterance.rate = 0.8; 
            synth.speak(utterance);
        }

        function init() {
            const COL_SIZE = 7;
            xuanjiData.forEach((char, i) => {
                const r = Math.floor(i / COL_SIZE);
                const c = i % COL_SIZE;
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = char;
                
                // 視覺強化：對角線或首尾著色
                if (c === 0 || c === 6) div.style.color = '#8c2727';

                const triggerAction = () => {
                    if (lastReadRow !== r) {
                        showPath(r, COL_SIZE);
                        lastReadRow = r;
                    }
                };

                div.onmouseenter = triggerAction;
                div.ontouchstart = (e) => {
                    e.preventDefault();
                    triggerAction();
                };
                matrix.appendChild(div);
            });
        }

        function showPath(row, colSize) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight-active'));
            const cells = document.querySelectorAll('.cell');
            let text = "";
            
            cells.forEach((cell, i) => {
                const r = Math.floor(i / colSize);
                if (r === row) {
                    cell.classList.add('highlight-active');
                    text += cell.innerText;
                }
            });

            output.innerHTML = `<span class="text-yellow-400">「</span>${text}<span class="text-yellow-400">」</span> <i class="fa fa-rss animate-pulse audio-wave"></i>`;
            speakText(text);
        }

        // 激活音訊
        document.body.addEventListener('touchstart', () => {
            synth.speak(new SpeechSynthesisUtterance(''));
            voiceStatus.innerText = "音訊通道已激活";
        }, { once: true });

        init();
    </script>
</body>
</html>
