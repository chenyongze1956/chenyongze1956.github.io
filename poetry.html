
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>璇玑织锦 - 响应式流动版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. 流动渐变背景 */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #ff7e5f, #feb47b, #ffed86, #9feb8f, #5fbfff, #9b8eff);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "STKaiti", "KaiTi", serif;
            overflow-x: hidden;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 响应式尺寸变量 */
        :root {
            --cell-size: 45px;
            --font-size: 1.4rem;
        }

        /* 针对手机端的优化 (宽度小于 500px) */
        @media screen and (max-width: 500px) {
            :root {
                --cell-size: 36px;  /* 缩小格子 */
                --font-size: 1.1rem; /* 缩小字号 */
            }
            .title-h1 { font-size: 1.8rem !important; }
        }

        /* 3. 织锦容器样式 */
        .brocade-frame {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border: 8px double #b89150;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            border-radius: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, var(--cell-size));
            grid-template-rows: repeat(9, var(--cell-size));
            gap: 1px;
            background-color: rgba(184, 145, 80, 0.3);
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            font-size: var(--font-size);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        /* 交互效果 */
        .cell:hover {
            background: #8c2727;
            color: white !important;
            transform: scale(1.15);
            z-index: 10;
            border-radius: 4px;
        }

        .highlight-active {
            background: #fff9c4;
            color: #8c2727;
        }

        /* 底部信息栏 */
        .info-panel {
            margin-top: 2rem;
            width: 90%;
            max-width: 420px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="title-area text-center mb-6">
        <h1 class="title-h1 text-white text-4xl font-bold tracking-widest drop-shadow-lg">璇玑织锦</h1>
        <p class="text-white/80 italic mt-2 text-sm">—— 锦字纵横，回环皆诗 ——</p>
    </div>

    <div class="brocade-frame">
        <div id="matrix" class="grid">
            </div>
    </div>

    <div class="info-panel">
        <div id="output" class="text-lg min-h-[1.5em]">触碰文字 开启回环</div>
        <p class="text-[10px] text-white/50 mt-2 uppercase tracking-tighter">Compatible with PC & Mobile</p>
    </div>

    <script>
        const xuanjiData = [
            "春","红","乱","蕊","落","花","飞","蝶","舞",
            "红","树","莺","啼","晓","雾","迷","远","墅",
            "乱","莺","芳","草","绿","堤","长","步","雨",
            "蕊","啼","草","深","幽","径","远","山","翠",
            "落","晓","绿","幽","静","院","闲","愁","聚",
            "花","雾","堤","径","院","空","望","归","去",
            "飞","迷","长","远","闲","望","月","明","孤",
            "蝶","远","步","山","愁","归","明","灯","独",
            "舞","墅","雨","翠","聚","去","孤","独","虚"
        ];

        const matrix = document.getElementById('matrix');
        const output = document.getElementById('output');

        function init() {
            xuanjiData.forEach((char, i) => {
                const r = Math.floor(i / 9);
                const c = i % 9;
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = char;
                
                // 颜色逻辑：边缘和中心着色不同
                div.style.color = (r === c || r + c === 8) ? '#8c2727' : '#274472';
                
                // 适配鼠标和触摸
                div.onmouseenter = () => showPath(r);
                div.ontouchstart = (e) => {
                    e.preventDefault();
                    showPath(r);
                };
                div.onmouseleave = clearPath;
                
                matrix.appendChild(div);
            });
        }

        function showPath(row) {
            clearPath();
            const cells = document.querySelectorAll('.cell');
            let text = "";
            cells.forEach((cell, i) => {
                const r = Math.floor(i / 9);
                if (r === row) {
                    cell.classList.add('highlight-active');
                    text += cell.innerText;
                }
            });
            output.innerHTML = `<span class="text-yellow-400">“</span>${text}<span class="text-yellow-400">”</span>`;
        }

        function clearPath() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight-active'));
        }

        init();
    </script>
</body>
</html>
