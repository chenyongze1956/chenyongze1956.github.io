
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        /* 核心变量定义 */
        :root {
            --ink: #3a2e24;       /* 书墨色 */
            --paper: #f4e9d4;     /* 宣纸色 */
            --blood: #b72d2d;     /* 朱砂红 */
            --gold: #c5a059;      /* 描金色 */
            --totem-opacity: 0.1; /* 图腾初始透明度 */
        }


    


        /* 基础样式 reset */
        body {
            margin: 0;
   background: linear-gradient(135deg, #ff7e5f, #feb47b, #ffed86, #9feb8f, #5fbfff, #9b8eff);            color: var(--ink);
            font-family: 'PingFang SC', "Microsoft YaHei", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 宣纸/羊皮纸容器 */
        .container {
            width: 95%;
            max-width: 650px;
            background-color: var(--paper);
            background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
            padding: clamp(20px, 5vw, 40px);
            box-shadow: 0 25px 70px rgba(0,0,0,0.6), inset 0 0 80px rgba(139, 69, 19, 0.15);
            border: 1px solid #d2c1a5;
            position: relative;
            border-radius: 2px;
            filter: sepia(0.1);
        }

        /* 顶部标题设计 */
        .header {
            text-align: center;
            border-bottom: 2px double var(--gold);
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .title {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: clamp(2rem, 8vw, 3rem);
            color: var(--blood);
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(183, 45, 45, 0.2);
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 3px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* 泊宫卡片网格 */
        .bogong-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(139, 69, 19, 0.2);
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
        }

        .card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .card.active {
            background: var(--blood);
            border-color: var(--blood);
            color: white;
            box-shadow: 0 5px 20px rgba(183, 45, 45, 0.4);
            transform: translateY(-5px);
        }

        .star-main { font-family: 'Zhi Mang Xing'; font-size: 1.8rem; margin: 5px 0; }
        .star-sub { font-size: 1rem; color: var(--gold); }
        .card.active .star-sub { color: white; opacity: 0.8; }
        .card-label { font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px; }

        /* 中央展示区：重点修改 */
        .display-panel {
            width: 100%;
            min-height: 380px;
            border: 1px inset rgba(139, 69, 19, 0.1);
            padding: 30px;
            box-sizing: border-box;
            position: relative; /* 关键：为了定位图腾 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 古代图腾图层 */
        .totem-layer {
            position: absolute;
            width: 80%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1; /* 在文字下方 */
            opacity: 0;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            transform: scale(1.1) rotate(-5deg);
            pointer-events: none; /* 穿透点击 */
            filter: blur(0.5px); /* 模拟墨迹边缘 */
        }

        /* 图腾显现状态 */
        .totem-layer.active {
            opacity: var(--totem-opacity);
            transform: scale(1) rotate(0deg);
        }

        /* SVG 图腾样式 */
        .totem-svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--ink); /* 使用墨色描边 */
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 解码文字盒 */
        .oracle-box {
            writing-mode: vertical-rl; /* 电脑端默认竖排 */
            text-orientation: mixed;
            display: flex;
            flex-direction: row;
            z-index: 2; /* 在图腾上方 */
            height: 350px;
        }

        /* 文字行样式 */
        .oracle-line {
            font-family: 'Ma Shan Zheng', serif;
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            line-height: 2.2;
            margin-left: 20px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.8s ease;
            color: var(--ink);
            white-space: nowrap;
        }

        .active-line {
            opacity: 1;
            transform: translateX(0);
        }

        /* 强调词：使用朱砂红 */
        .highlight { color: var(--blood); }

        /* 手机端适配：泊宫卡片变两行，文字恢复横排 */
        @media (max-width: 768px) {
            .bogong-grid { grid-template-columns: repeat(2, 1fr); }
            
            .oracle-box {
                writing-mode: horizontal-tb; /* 手机端恢复横排 */
                flex-direction: column;
                height: auto;
                text-align: center;
            }
            .oracle-line {
                margin-left: 0;
                margin-bottom: 15px;
                transform: translateY(10px);
                white-space: normal;
            }
            .active-line { transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="subtitle">戊辰年十一月初十 · 坤造</div>
        <h1 class="title">演禽通纂</h1>
    </div>

    <div class="bogong-grid">
        <div class="card" onclick="decode('left_sub', this)">
            <div class="card-label">左辅 (气象)</div>
            <div class="star-main">娄犴</div>
            <div class="star-sub">娄岸</div>
        </div>
        
        <div class="card active" onclick="decode('main', this)">
            <div class="card-label">正印 (命元)</div>
            <div class="star-main">女燕</div>
            <div class="star-sub">女刀</div>
        </div>

        <div class="card" onclick="decode('guest', this)">
            <div class="card-label">外缘 (客将)</div>
            <div class="star-main">翼蛇</div>
            <div class="star-sub">翼月</div>
        </div>

        <div class="card" onclick="decode('right_sub', this)">
            <div class="card-label">右弼 (根基)</div>
            <div class="star-main">昴鸡</div>
            <div class="star-sub">昴草</div>
        </div>
    </div>

    <div class="display-panel">
        <div id="totemDisplay" class="totem-layer active">
            <svg class="totem-svg" viewBox="0 0 100 100">
                <path d="M50,20 C60,30 80,40 90,40 C80,50 60,60 50,70 C40,60 20,50 10,40 C20,40 40,30 50,20 Z" stroke-width="2"/> <path d="M50,70 L50,90 M40,85 L50,90 L60,85" stroke-width="1.5"/> <path d="M30,35 A20,20 0 0,0 15,25 M70,35 A20,20 0 0,1 85,25" stroke-width="1"/> </svg>
        </div>

        <div id="oracleOutput" class="oracle-box">
            </div>
    </div>



    
</div>

<script>
    // 定义 SVG 图腾数据 (内联存储，无需外部图片)
    const totems = {
        main: `<svg class="totem-svg" viewBox="0 0 100 100"><path d="M50,20 C60,30 80,40 90,40 C80,50 60,60 50,70 C40,60 20,50 10,40 C20,40 40,30 50,20 Z" stroke-width="2"/><path d="M50,70 L50,90 M40,85 L50,90 L60,85" stroke-width="1.5"/><path d="M30,35 A20,20 0 0,0 15,25 M70,35 A20,20 0 0,1 85,25" stroke-width="1"/></svg>`, // 燕
        left_sub: `<svg class="totem-svg" viewBox="0 0 100 100"><path d="M30,40 A20,25 0 0,1 70,40 L70,70 A20,10 0 0,1 30,70 Z" stroke-width="2"/><path d="M30,45 L15,35 M70,45 L85,35 M50,40 L50,30" stroke-width="1.5"/><path d="M40,70 L35,85 M60,70 L65,85" stroke-width="1.5"/></svg>`, // 犴
        guest: `<svg class="totem-svg" viewBox="0 0 100 100"><path d="M20,50 C20,30 40,20 50,20 C70,20 80,40 80,60 C80,80 60,90 40,85 C30,80 20,70 20,50 Z" stroke-width="2"/><path d="M50,20 C60,10 80,10 90,20" stroke-width="1.5"/><path d="M35,60 L45,70 M65,60 L55,70" stroke-width="1"/></svg>`, // 蛇
        right_sub: `<svg class="totem-svg" viewBox="0 0 100 100"><circle cx="50" cy="40" r="15" stroke-width="2"/><path d="M35,40 A30,40 0 0,0 50,80 A30,40 0 0,0 65,40 Z" stroke-width="2"/><path d="M50,25 L50,15 M45,20 L55,20" stroke-width="1.5"/><path d="M35,60 L20,70 M65,60 L80,70" stroke-width="1"/></svg>` // 鸡
    };

    // 演禽通纂断语数据
    const dataset = {
        main: [
            "主星<span class='highlight'>女土蝠</span>，化象海燕。",
          
        ],
        left_sub: [
            "副将<span class='highlight'>娄金犴</span>，禀金气之烈。",
          
        ],
        guest: [
            "客将<span class='highlight'>翼火蛇</span>，化象为龙。",
           
        ],
        right_sub: [
            "副将<span class='highlight'>昴日鸡</span>，日精之气。",
            
        ]
    };

    function decode(key, el) {
        // 1. 更新卡片激活状态
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');

        // 2. 更新图腾展示 (先淡出，更换，再淡入)
        const totemDisplay = document.getElementById('totemDisplay');
        totemDisplay.classList.remove('active');
        
        setTimeout(() => {
            totemDisplay.innerHTML = totems[key];
            totemDisplay.classList.add('active');
        }, 300); // 等待淡出动画

        // 3. 更新解码文字
        const output = document.getElementById('oracleOutput');
        output.innerHTML = ''; // 清空当前内容
        
        dataset[key].forEach((text, i) => {
            const p = document.createElement('div');
            p.className = 'oracle-line';
            p.innerHTML = text;
            output.appendChild(p);
            // 延迟显示动画 (逐行浮现)
            setTimeout(() => p.classList.add('active-line'), i * 350);
        });

        // 4. 震动反馈 (移动端手感)
        if (navigator.vibrate) navigator.vibrate(15);
    }

    // 页面加载完成自动初始化显示“主将”
    window.onload = () => {
        decode('main', document.querySelector('.card.active'));
    };
</script>

</body>
</html>
