    <style>
        :root {

        }
        body {
            margin: 0;
            padding: 0;
            font-family: "Product Sans", Arial, sans-serif;
            background-color: var(--bg);
            cursor: url(https://cur.cursors-4u.net/nature/nat-10/nat927.png), auto !important;
            overflow-x: hidden;
        }

        /* 樱花画布容器设置 */
        #canvas_sakura {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* 放在内容后面 */
            pointer-events: none;
        }

        /* 顶部导航栏 */
        header ul {
            list-style-type: none;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        header li a {
            color: #000;
            display: block;
            text-align: center;
            padding: 8px;
            text-decoration: none;
            font-size: 14px;
        }
        .kkk { height: 22px; vertical-align: middle; }

        /* 主体布局 */
        .main-container {
            text-align: center;
            padding: 0 15px;
            margin-top: 15vh;
            position: relative;
            z-index: 1;
        }

        /* Logo 动画 */
        .bounce { margin-bottom: 25px; white-space: nowrap; }
        .letter {
            display: inline-block;
            font: normal bold 4.5rem "Product Sans", sans-serif;
            animation: bounce 0.75s cubic-bezier(0.05, 0, 0.2, 1) infinite alternate;
        }
        @media (min-width: 768px) { .letter { font-size: 6rem; } }
        @media (max-width: 480px) { .letter { font-size: 3.5rem; } }

        .letter:nth-child(1) { color: #4285f4; animation-delay: 0s; }
        .letter:nth-child(2) { color: #ea4335; animation-delay: 0.08s; }
        .letter:nth-child(3) { color: #fbbc05; animation-delay: 0.16s; }
        .letter:nth-child(4) { color: #4285f4; animation-delay: 0.25s; }
        .letter:nth-child(5) { color: #34a853; animation-delay: 0.33s; }
        .letter:nth-child(6) { color: #ea4335; animation-delay: 0.41s; }

        @keyframes bounce {
            0% { transform: translate3d(0, 0, 0); text-shadow: rgba(0,0,0,0.1) 0 0 0.05em; }
            100% { transform: translate3d(0, -0.4em, 0); text-shadow: rgba(0,0,0,0.1) 0 0.4em 0.2em; }
        }

        /* 搜索框 */
        .search-wrapper {
            display: flex;
            align-items: center;
            width: 580px;
            max-width: 100%;
            margin: 0 auto;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 2px 12px;
            transition: box-shadow 0.3s;
            background: rgba(255, 255, 255, 0.9); /* 微透明以便透出樱花 */
            box-sizing: border-box;
        }
        .search-wrapper:hover, .search-wrapper:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.2);
        }
        .searchbar {
            flex-grow: 1;
            height: 40px;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 0 8px;
            background: transparent;
        }
        .icon-btn { background: none; border: none; cursor: pointer; padding: 8px; display: flex; align-items: center; }
        .icon-btn img { height: 20px; }

        .buttons { margin-top: 25px; }
        .button {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            color: #3c4043;
            font-size: 14px;
            padding: 10px 18px;
            margin: 4px;
            border-radius: 4px;
            cursor: pointer;
        }
        @media (max-width: 480px) { .button { padding: 12px 15px; width: 45%; } }

        .hint { color: #70757a; font-size: 12px; margin-top: 15px; line-height: 1.5; }
        #visitorCounterContainer { margin-top: 30px; padding-bottom: 20px; }
    </style>
</head>

    <!-- 脚本部分 -->
    <script>
        // 搜索逻辑
        const searchInput = document.getElementById('search-input');
        function handleSearch(e) {
            e.preventDefault();
            const fullQuery = searchInput.value.trim();
            if (!fullQuery) return false;
            let url = "";
            const spaceIndex = fullQuery.indexOf(" ");
            const prefix = spaceIndex !== -1 ? fullQuery.substring(0, spaceIndex).toLowerCase() : "";
            const keyword = spaceIndex !== -1 ? fullQuery.substring(spaceIndex + 1) : fullQuery;
            switch(prefix) {
                case 'b': url = `https://www.baidu.com/s?wd=${encodeURIComponent(keyword)}`; break;
                case 'w': url = `https://zh.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(keyword)}`; break;
                case 'm': url = `https://www.google.com/maps/search/${encodeURIComponent(keyword)}`; break;
                default: url = `https://www.google.com/search?q=${encodeURIComponent(fullQuery)}`;
            }
            window.location.href = url;
            return false;
        }

        // 语音识别
        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            micBtn.addEventListener('click', () => { recognition.start(); micBtn.style.opacity = "0.3"; });
            recognition.onresult = (event) => {
                searchInput.value = event.results[0][0].transcript;
                micBtn.style.opacity = "1";
                handleSearch(new Event('submit'));
            };
            recognition.onerror = () => { micBtn.style.opacity = "1"; };
            recognition.onspeechend = () => { recognition.stop(); micBtn.style.opacity = "1"; };
        } else {
            micBtn.style.display = "none";
        }

        // 樱花特效加载逻辑 (不再需要jQuery)
        (function() {
            function loadScript(url, callback) {
                var script = document.createElement("script");
                script.type = "text/javascript";
                script.src = url;
                script.onload = callback;
                document.body.appendChild(script);
            }

            // 加载樱花和鼠标特效
            loadScript("https://blog-static.cnblogs.com/files/izbw/yinghua.js", function() {
                console.log("Sakura Loaded");
            });
            loadScript("https://blog-static.cnblogs.com/files/izbw/shubiaotexiao.js", function() {
                console.log("Mouse Effect Loaded");
            });
        })();
    </script>
