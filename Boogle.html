    <style>
        :root {
            --bg: #fff;
            --text: #000;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: "Product Sans", Arial, sans-serif;
            background-color: var(--bg);
            /* 手机端通常不显示自定义光标，保留电脑端效果 */
            cursor: url(https://cur.cursors-4u.net/nature/nat-10/nat927.png), auto !important;
            overflow-x: hidden; /* 防止左右晃动 */
        }

        /* 顶部导航栏 - 响应式调整 */
        header ul {
            list-style-type: none;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-wrap: wrap; /* 手机端图标多时自动换行 */
            justify-content: flex-end;
        }
        header li { 
            display: inline-block;
        }
        header li a {
            color: #000;
            display: block;
            text-align: center;
            padding: 8px;
            text-decoration: none;
            font-size: 14px;
        }
        .kkk { height: 22px; vertical-align: middle; }

        /* 主体布局 */
        .main-container {
            text-align: center;
            padding: 0 15px;
            margin-top: 15vh; /* 使用视口高度单位，电脑手机都美观 */
        }

        /* 彩虹跳动 Logo - 响应式字体 */
        .bounce { margin-bottom: 25px; white-space: nowrap; }
        .letter {
            display: inline-block;
            font: normal bold 4.5rem "Product Sans", sans-serif; /* 默认略小 */
            animation: bounce 0.75s cubic-bezier(0.05, 0, 0.2, 1) infinite alternate;
        }
        /* 电脑端 Logo 大小 */
        @media (min-width: 768px) {
            .letter { font-size: 6rem; }
        }
        /* 手机端 Logo 更小一点 */
        @media (max-width: 480px) {
            .letter { font-size: 3.5rem; }
        }

        .letter:nth-child(1) { color: #4285f4; animation-delay: 0s; }
        .letter:nth-child(2) { color: #ea4335; animation-delay: 0.08s; }
        .letter:nth-child(3) { color: #fbbc05; animation-delay: 0.16s; }
        .letter:nth-child(4) { color: #4285f4; animation-delay: 0.25s; }
        .letter:nth-child(5) { color: #34a853; animation-delay: 0.33s; }
        .letter:nth-child(6) { color: #ea4335; animation-delay: 0.41s; }

        @keyframes bounce {
            0% { transform: translate3d(0, 0, 0); text-shadow: rgba(0,0,0,0.1) 0 0 0.05em; }
            100% { transform: translate3d(0, -0.4em, 0); text-shadow: rgba(0,0,0,0.1) 0 0.4em 0.2em; }
        }

        /* 搜索框容器 - 关键响应式设计 */
        .search-wrapper {
            display: flex;
            align-items: center;
            width: 580px;
            max-width: 100%; /* 手机端宽度占满 */
            margin: 0 auto;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 2px 12px;
            transition: box-shadow 0.3s;
            background: #fff;
            box-sizing: border-box;
        }
        .search-wrapper:hover, .search-wrapper:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.2);
        }
        .searchbar {
            flex-grow: 1;
            height: 40px;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 0 8px;
            width: 10px; /* 强制 flex 均匀分布 */
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
        }
        .icon-btn img { height: 20px; }

        /* 按钮组 */
        .buttons { margin-top: 25px; }
        .button {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            color: #3c4043;
            font-size: 14px;
            padding: 10px 18px;
            margin: 4px;
            border-radius: 4px;
            cursor: pointer;
        }
        /* 手机端按钮稍微大一点方便点击 */
        @media (max-width: 480px) {
            .button { padding: 12px 15px; width: 45%; }
        }

        .hint { color: #70757a; font-size: 12px; margin-top: 15px; line-height: 1.5; }

        /* 樱花飘落 */
        .snowflake {
            position: fixed;
            top: -10%;
            z-index: 9999;
            user-select: none;
            pointer-events: none; /* 防止点击雪花无法点击下面的按钮 */
            animation-name: snowflakes-fall, snowflakes-shake;
            animation-duration: 10s, 3s;
            animation-timing-function: linear, ease-in-out;
            animation-iteration-count: infinite, infinite;
        }
        @keyframes snowflakes-fall { 0% { top: -10%; } 100% { top: 100%; } }
        @keyframes snowflakes-shake { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(50px); } }

        #visitorCounterContainer { margin-top: 30px; padding-bottom: 20px; }
    </style>

            <span class="letter">B</span><span class="letter">o</span><span class="letter">o</span><span class="letter">g</span><span class="letter">l</span><span class="letter">e</span>

        <form id="search-form" onsubmit="return handleSearch(event)">
            <div class="search-wrapper">
                <input id="search-input" class="searchbar" type="search" placeholder="输入内容或 'b 指令'..." autocomplete="off">
                <button id="mic-btn" class="icon-btn" type="button" title="语音搜索">

                <button type="submit" class="button">Boogle Search</button>
                <button type="button" class="button" onclick="window.location.href='https://chenyongze1956.github.io/terminal.html'">Feeling Lucky</button>
            </div>

        <div class="hint">
            💡 快捷指令：<b>b</b> 百度 | <b>w</b> 维基 | <b>m</b> 地图<br>
            用法：输入前缀 + 空格 + 关键词

            <img src="https://visitor-badge.laobi.icu/badge?page_id=chenyongze1956.Booglexp&left_text=总访问量&color=4285f4&style=flat" alt="Visitor Count">

    <script>
        const searchInput = document.getElementById('search-input');

        function handleSearch(e) {
            e.preventDefault();
            const fullQuery = searchInput.value.trim();
            if (!fullQuery) return false;

            let url = "";
            const spaceIndex = fullQuery.indexOf(" ");
            const prefix = spaceIndex !== -1 ? fullQuery.substring(0, spaceIndex).toLowerCase() : "";
            const keyword = spaceIndex !== -1 ? fullQuery.substring(spaceIndex + 1) : fullQuery;

            switch(prefix) {
                case 'b':
                    url = `https://www.baidu.com/s?wd=${encodeURIComponent(keyword)}`;
                    break;
                case 'w':
                    url = `https://zh.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(keyword)}`;
                    break;
                case 'm':
                    url = `https://www.google.com/maps/search/${encodeURIComponent(keyword)}`;
                    break;
                default:
                    url = `https://www.google.com/search?q=${encodeURIComponent(fullQuery)}`;
            }

            window.location.href = url;
            return false;
        }

        // 语音识别逻辑
        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';

            micBtn.addEventListener('click', () => {
                recognition.start();
                micBtn.style.opacity = "0.3";
            });

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                searchInput.value = transcript;
                micBtn.style.opacity = "1";
                handleSearch(new Event('submit'));
            };

            recognition.onerror = () => { micBtn.style.opacity = "1"; };
            recognition.onspeechend = () => { recognition.stop(); micBtn.style.opacity = "1"; };
        } else {
            micBtn.style.display = "none";
        }
    </script>
