
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --led-color: #ff4500; --font-pixel: 'Press Start 2P', cursive; }
        body {
            background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff);   
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow-x: hidden;
        }

        /* 播放器容器 */
        .cassette-player {
            background: #222; border-radius: 12px; padding: 5vw;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); width: 85%;
            max-width: 400px; text-align: center; z-index: 10; position: relative;
        }
        .tape-window {
            background: #000; height: clamp(100px, 20vh, 150px);
            margin-bottom: 20px; display: flex; justify-content: space-around;
            align-items: center; border: 4px solid #1a1a1a; position: relative;
        }
        .tape-reel { width: clamp(40px, 12vw, 60px); height: clamp(40px, 12vw, 60px); border: 3px dashed #444; border-radius: 50%; }
        .tape-reel.playing { animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #timeDisplay { font-family: var(--font-pixel); color: var(--led-color); font-size: 0.6rem; margin-bottom: 20px; }
        .control-btn { background: #3d3d3d; color: #fff; border: none; padding: 10px 15px; cursor: pointer; margin: 5px; font-family: var(--font-pixel); font-size: 0.5rem; }

        /* --- 气泡框显示逻辑：强制样式覆盖 --- */
        .live2d-widget-dialog-container {
            position: fixed !important;
            right: 20px !important;
            bottom: 260px !important;
            width: 180px !important;
            min-height: 50px !important;
            background-color: #ffffff !important;
            border: 3px solid #000 !important;
            border-radius: 12px !important;
            z-index: 999999 !important;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
            pointer-events: none;
            display: flex !important;
            align-items: center;
            justify-content: center;
            padding: 10px !important;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* 核心修复：强制内部文字显色为纯黑 */
        #live2d-widget .live2d-widget-dialog {
            color: #000000 !important; 
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
            font-size: 14px !important;
            font-family: Arial, sans-serif !important;
            font-weight: bold !important;
            text-align: center;
            width: 100%;
        }

        .live2d-widget-dialog-container.active {
            opacity: 1 !important;
            visibility: visible !important;
        }

        /* 录音状态：猫咪发光提示 */
        #live2d-widget.listening {
            filter: drop-shadow(0 0 15px #ff4500) !important;
        }

        .live2d-widget-dialog-container::after {
            content: ''; position: absolute; bottom: -12px; right: 30px;
            border-width: 12px 10px 0; border-style: solid; border-color: #000 transparent transparent;
        }

        #live2d-widget { pointer-events: auto !important; }

        @media (max-width: 480px) {
            .live2d-widget-dialog-container { bottom: 210px !important; width: 140px; }
        }
    </style>
</head>
<body>

<div class="cassette-player">
    <div style="font-family: var(--font-pixel); color: #666; font-size: 0.5rem; margin-bottom: 15px;">AI MUSIC STATION</div>
    <div class="tape-window">
        <div class="tape-reel left"></div>
        <div class="tape-reel right"></div>
    </div>
    <div id="timeDisplay">READY</div>
    <input type="file" id="audioFile" hidden accept="audio/*">
    <button class="control-btn" onclick="document.getElementById('audioFile').click()">LOAD TAPE</button>
    <div class="btns">
        <button class="control-btn" id="playBtn">PLAY</button>
        <button class="control-btn" id="stopBtn">STOP</button>
    </div>
    <div style="margin-top:10px; font-size: 10px; color: #555;">点击猫咪开始语音聊天</div>
    <audio id="mainAudio"></audio>
</div>

<script src="https://unpkg.com/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>

<script>
    // 1. 初始化 Live2D
    L2Dwidget.init({
        "model": { "jsonPath": "https://unpkg.com/live2d-widget-model-hijiki@1.0.5/assets/hijiki.model.json", "scale": 1 },
        "display": { "position": "right", "width": 180, "height": 360, "hOffset": 10, "vOffset": -20 },
        "mobile": { "show": true, "scale": 0.5 },
        "dialog": { "enable": true } 
    });

    // 2. DeepSeek API 配置
    const API_KEY = 'sk-29e9cc216a944dd2a5f518ace2d4d65a';
    const API_URL = 'https://api.deepseek.com/chat/completions';

    // 3. 核心逻辑函数
    let dialogTimer;

    // 显示气泡、显示黑色文字并语音朗读
    function showCatSpeech(text, needSpeak = true) {
        const container = document.querySelector('.live2d-widget-dialog-container');
        const dialogBox = document.querySelector('.live2d-widget-dialog');
        
        if (container && dialogBox) {
            clearTimeout(dialogTimer);
            dialogBox.innerText = text; // 写入文字
            container.classList.add('active'); // 显示气泡
            
            // 语音合成 (TTS)
            if (needSpeak) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.pitch = 1.3; // 高音调，更有猫的感觉
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }

            dialogTimer = setTimeout(() => {
                container.classList.remove('active');
            }, 5000);
        }
    }

    // 调用 DeepSeek API
    async function askAI(userText) {
        showCatSpeech("让我想想喵...", false);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        { role: "system", content: "你是一只叫Hijiki的黑猫。你性格傲娇但忠诚，喜欢复古磁带音乐。说话必须以'喵'结尾。请简洁地回答Master。" },
                        { role: "user", content: userText }
                    ]
                })
            });
            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            showCatSpeech(aiReply);
        } catch (error) {
            showCatSpeech("哎呀，脑子卡住了喵！");
            console.error(error);
        }
    }

    // 4. 语音识别 (ASR)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.interimResults = false;

        recognition.onstart = () => {
            document.getElementById('live2d-widget').classList.add('listening');
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            showCatSpeech("你说: " + transcript, false);
            askAI(transcript);
        };

        recognition.onend = () => {
            document.getElementById('live2d-widget').classList.remove('listening');
        };

        recognition.onerror = () => {
            showCatSpeech("没听清喵，再说一遍？");
            document.getElementById('live2d-widget').classList.remove('listening');
        };
    }

    // 5. 事件绑定
    window.onload = function() {
        // 定时检查 Canvas 是否加载完成，然后绑定点击事件
        const checkCanvas = setInterval(() => {
            const canvas = document.getElementById('live2dcanvas');
            if (canvas) {
                clearInterval(checkCanvas);
                canvas.addEventListener('mousedown', () => {
                    if (recognition) {
                        try {
                            recognition.start();
                        } catch (e) {
                            console.log("识别已在运行...");
                        }
                    } else {
                        alert("浏览器不支持语音识别喵！");
                    }
                });
            }
        }, 500);
    };

    // 6. 播放器控制 (保持原逻辑)
    const audio = document.getElementById('mainAudio');
    const playBtn = document.getElementById('playBtn');
    const reels = document.querySelectorAll('.tape-reel');

    document.getElementById('audioFile').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            audio.src = URL.createObjectURL(file);
            document.getElementById('timeDisplay').innerText = "TAPE LOADED";
            showCatSpeech("磁带塞进去了喵！");
        }
    };

    playBtn.onclick = () => {
        if(!audio.src) return alert("请先加载音频喵！");
        if(audio.paused) {
            audio.play();
            playBtn.innerText = "PAUSE";
            reels.forEach(r => r.classList.add('playing'));
            showCatSpeech("起飞！音乐开始喵~");
        } else {
            audio.pause();
            playBtn.innerText = "PLAY";
            reels.forEach(r => r.classList.remove('playing'));
        }
    };

    document.getElementById('stopBtn').onclick = () => {
        audio.pause(); audio.currentTime = 0;
        playBtn.innerText = "PLAY";
        reels.forEach(r => r.classList.remove('playing'));
        showCatSpeech("关掉音乐，休息一下喵...");
    };
</script>
</body>
</html>
