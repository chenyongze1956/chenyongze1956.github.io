
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --led-color: #ff4500; --font-pixel: 'Press Start 2P', cursive; }
        body {
background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff);   
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
        }
        .cassette-player {
            background: #222; border-radius: 12px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            width: 90%; max-width: 450px; text-align: center; z-index: 10; position: relative;
        }
        .tape-window {
            background: #000; height: 150px; margin-bottom: 20px;
            display: flex; justify-content: space-around; align-items: center;
            border: 4px solid #1a1a1a; position: relative;
        }
        .tape-reel { width: 60px; height: 60px; border: 3px dashed #444; border-radius: 50%; }
        .tape-reel.playing { animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #timeDisplay { font-family: var(--font-pixel); color: var(--led-color); font-size: 0.7rem; margin-bottom: 20px; }
        .control-btn { background: #3d3d3d; color: #fff; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; font-family: var(--font-pixel); font-size: 0.5rem; }
        
        /* 确保看板娘容器不遮挡点击 */
        #live2d-widget { pointer-events: none !important; }
        #live2dcanvas { pointer-events: auto !important; }
    </style>
</head>
<body>

<div class="cassette-player">
    <div style="font-family: var(--font-pixel); color: #666; font-size: 0.6rem; margin-bottom: 15px;">LIVE2D MUSIC STATION</div>
    <div class="tape-window">
        <div class="tape-reel left"></div>
        <div class="tape-reel right"></div>
    </div>
    <div id="timeDisplay">READY</div>
    <input type="file" id="audioFile" hidden accept="audio/*">
    <button class="control-btn" onclick="document.getElementById('audioFile').click()">LOAD TAPE</button>
    <div class="btns">
        <button class="control-btn" id="playBtn">PLAY</button>
        <button class="control-btn" id="stopBtn">STOP</button>
    </div>
    <audio id="mainAudio"></audio>
</div>

<!-- 脚本加载顺序：必须先加载核心库 -->
<script src="https://unpkg.com/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>

<script>
    // --- 1. 看板娘初始化 ---
    // 使用 unpkg 的模型，这是目前部署在 GitHub Pages 上最稳定的方式
    L2Dwidget.init({
        "model": {
            "jsonPath": "https://unpkg.com/live2d-widget-model-hijiki@1.0.5/assets/hijiki.model.json",
            "scale": 1
        },
        "display": {
            "position": "right",
            "width": 200,
            "height": 400,
            "hOffset": 20,
            "vOffset": -20
        },
        "mobile": { "show": true, "scale": 0.5 },
        "react": { "opacity": 1 },
        "dialog": {
            "enable": true,
            "script": {
                'every idle 10s': '在听什么好歌呢？',
                'tap body': '哎呀！别碰我~',
                'tap face': 'Master，音乐很好听哦！'
            }
        }
    });

    // --- 2. 播放器逻辑 ---
    const audio = document.getElementById('mainAudio');
    const playBtn = document.getElementById('playBtn');
    const reels = document.querySelectorAll('.tape-reel');

    document.getElementById('audioFile').onchange = function(e) {
        const file = e.target.files[0];
        if(file) audio.src = URL.createObjectURL(file);
        document.getElementById('timeDisplay').innerText = "TAPE LOADED";
    };

    playBtn.onclick = () => {
        if(!audio.src) return alert("请先选择音频文件！");
        if(audio.paused) {
            audio.play();
            playBtn.innerText = "PAUSE";
            reels.forEach(r => r.classList.add('playing'));
        } else {
            audio.pause();
            playBtn.innerText = "PLAY";
            reels.forEach(r => r.classList.remove('playing'));
        }
    };

    document.getElementById('stopBtn').onclick = () => {
        audio.pause();
        audio.currentTime = 0;
        playBtn.innerText = "PLAY";
        reels.forEach(r => r.classList.remove('playing'));
    };
</script>
</body>
</html>
