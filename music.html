

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --led-color: #ff4500; --font-pixel: 'Press Start 2P', cursive; }
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            touch-action: manipulation;
        }

        /* 播放器样式 */
        .cassette-player {
            background: #222; border-radius: 12px; padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); width: 85%; max-width: 380px;
            text-align: center; z-index: 10; position: relative; border: 2px solid #444;
        }
        .tape-window {
            background: #000; height: clamp(80px, 15vh, 120px); margin-bottom: 20px;
            display: flex; justify-content: space-around; align-items: center; border: 4px solid #111;
        }
        .tape-reel { width: 50px; height: 50px; border: 3px dashed #555; border-radius: 50%; }
        .tape-reel.playing { animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #timeDisplay { font-family: var(--font-pixel); color: var(--led-color); font-size: 11px; margin-bottom: 20px; text-shadow: 0 0 8px var(--led-color); }
        .control-btn { background: #444; color: #00f2ff; border: 1px solid #000; padding: 12px 10px; cursor: pointer; margin: 5px; font-family: var(--font-pixel); font-size: 8px; border-radius: 4px; }

        /* --- 核心修复：强制气泡文字显示 --- */
        .live2d-widget-dialog-container {
            position: fixed !important;
            right: 10px !important;
            bottom: 30% !important;
            width: 180px !important;
            min-height: 60px !important;
            background: white !important;
            border: 3px solid #000 !important;
            border-radius: 12px !important;
            z-index: 999999 !important;
            opacity: 0;
            display: flex !important;
            align-items: center;
            justify-content: center;
            padding: 10px !important;
            pointer-events: none;
            transition: opacity 0.3s;
   opacity: 0 !important;
    visibility: hidden !important; 
    
    /* 2. 背景设为完全透明，或者带一点点磨砂感 */
    background: rgba(255, 255, 255, 0) !important;
        }
        .live2d-widget-dialog-container.active { opacity: 1 !important; }

        /* 强制气泡内文字颜色为深黑色 */
        #live2d-widget .live2d-widget-dialog {
            color: #000000 !important;
            opacity: 1 !important;
            display: block !important;
            visibility: visible !important;
            font-size: 14px !important;
            font-weight: bold !important;
            line-height: 1.4 !important;
            font-family: Arial, sans-serif !important;
            text-align: center;
              opacity: 0 !important;
    visibility: hidden !important; 
    
    /* 2. 背景设为完全透明，或者带一点点磨砂感 */
    background: rgba(255, 255, 255, 0) !important;

        }

        @media (max-width: 480px) {
            .cassette-player { width: 90%; }
            .live2d-widget-dialog-container { bottom: 220px !important; width: 140px !important; }
        }
    </style>
</head>
<body>

<div class="cassette-player">
    <div style="font-family: var(--font-pixel); color: #666; font-size: 8px; margin-bottom: 15px;">AI MUSIC STATION</div>
    <div class="tape-window">
        <div class="tape-reel left"></div>
        <div class="tape-reel right"></div>
    </div>
    <div id="timeDisplay">READY</div>
    <input type="file" id="audioFile" hidden accept="audio/*">
    <button class="control-btn" onclick="document.getElementById('audioFile').click()">LOAD TAPE</button>
    <div class="btns">
        <button class="control-btn" id="playBtn">PLAY</button>
        <button class="control-btn" id="stopBtn">STOP</button>
    </div>
    <div style="margin-top:10px; font-size: 10px; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000;">[ 点击猫咪互动喵 ]</div>
    <audio id="mainAudio" playsinline></audio>
</div>

<script src="https://unpkg.com/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
<script>
    // 1. 初始化 Live2D
    L2Dwidget.init({
        "model": { "jsonPath": "https://unpkg.com/live2d-widget-model-shizuku@1.0.5/assets/shizuku.model.json", "scale": 1 },
        "display": { "position": "right", "width": 150, "height": 300, "hOffset": 0, "vOffset": -20 },
        "mobile": { "show": true, "scale": 0.5 },
        "dialog": { "enable": true } 
    });

    const API_KEY = 'sk-29e9cc216a944dd2a5f518ace2d4d65a';
    const API_URL = 'https://api.deepseek.com/chat/completions';
    let dialogTimer;

    // 强制文字注入函数
    function showCatSpeech(text, needSpeak = true) {
        const container = document.querySelector('.live2d-widget-dialog-container');
        const dialogBox = document.querySelector('.live2d-widget-dialog');
        
        if (container && dialogBox) {
            clearTimeout(dialogTimer);
            
            // 关键修复：强制设置文字和透明度
            dialogBox.innerText = text;
            dialogBox.style.opacity = "1";
            container.classList.add('active');
            
            if (needSpeak) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.pitch = 1.3;
                window.speechSynthesis.speak(utterance);
            }
            dialogTimer = setTimeout(() => { container.classList.remove('active'); }, 5000);
        }
    }

    async function askAI(userText) {
        showCatSpeech("让我想想喵...", false);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        { role: "system", content: "你是一只叫Hijiki的黑猫。说话以'喵'结尾。简洁回答喵。" },
                        { role: "user", content: userText }
                    ]
                })
            });
            const data = await response.json();
            showCatSpeech(data.choices[0].message.content);
        } catch (error) {
            showCatSpeech("断网了喵！");
        }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.onresult = (e) => askAI(e.results[0][0].transcript);
    }

    window.onload = function() {
        const checkCanvas = setInterval(() => {
            const canvas = document.getElementById('live2dcanvas');
            if (canvas) {
                clearInterval(checkCanvas);
                const startInteraction = () => {
                    // 解锁音频
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
                    if (recognition) try { recognition.start(); } catch(err) {}
                };
                canvas.addEventListener('click', startInteraction);
                canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startInteraction(); }, { passive: false });
                document.getElementById('live2d-widget').style.pointerEvents = "none";
                canvas.style.pointerEvents = "auto";
            }
        }, 500);
    };

    // 播放器逻辑
    const audio = document.getElementById('mainAudio');
    const playBtn = document.getElementById('playBtn');
    const reels = document.querySelectorAll('.tape-reel');

    document.getElementById('audioFile').onchange = (e) => {
        const file = e.target.files[0];
        if(file) { audio.src = URL.createObjectURL(file); document.getElementById('timeDisplay').innerText = "TAPE READY"; }
    };
    playBtn.onclick = () => {
        if(!audio.src) return showCatSpeech("还没装磁带喵！");
        if(audio.paused) {
            audio.play().then(() => {
                playBtn.innerText = "PAUSE";
                reels.forEach(r => r.classList.add('playing'));
            });
        } else {
            audio.pause(); playBtn.innerText = "PLAY";
            reels.forEach(r => r.classList.remove('playing'));
        }
    };
</script>
</body>
</html>
