<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { 
            --led-color: #ff4500; 
            --font-pixel: 'Press Start 2P', cursive; 
            --vh: 1vh; /* 动态高度变量 */
        }
        
        html, body { 
            height: 100vh; 
            height: calc(var(--vh, 1vh) * 100); 
            margin: 0; 
            overflow: hidden; 
        }

        body {
            background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
        }

        /* 播放器响应式容器 */
        .cassette-player {
            background: #222; 
            border-radius: 12px; 
            padding: clamp(15px, 5vw, 30px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
            width: 85%; 
            max-width: 380px;
            text-align: center; 
            z-index: 10; 
            position: relative; 
            border: 2px solid #444;
        }

        .tape-window {
            background: #000; 
            height: clamp(80px, 15vh, 120px); 
            margin-bottom: 20px;
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border: 4px solid #111;
        }

        .tape-reel { 
            width: clamp(40px, 12vw, 55px); 
            height: clamp(40px, 12vw, 55px); 
            border: 3px dashed #555; 
            border-radius: 50%; 
        }

        .tape-reel.playing { animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #timeDisplay { 
            font-family: var(--font-pixel); 
            color: var(--led-color); 
            font-size: clamp(8px, 2.5vw, 11px); 
            margin-bottom: 20px; 
            text-shadow: 0 0 8px var(--led-color); 
        }

        .control-btn { 
            background: #444; 
            color: #00f2ff; 
            border: 1px solid #000; 
            padding: 12px 8px; 
            cursor: pointer; 
            margin: 5px; 
            font-family: var(--font-pixel); 
            font-size: clamp(6px, 1.8vw, 8px); 
            border-radius: 4px; 
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .control-btn:active { background: #555; }

        /* --- 气泡样式兼容优化 --- */
        .live2d-widget-dialog-container {
            position: fixed !important;
            right: 10px !important;
            bottom: clamp(200px, 35vh, 40%) !important;
            width: clamp(140px, 40vw, 180px) !important;
            min-height: 60px !important;
            background: white !important;
            border: 3px solid #000 !important;
            border-radius: 12px !important;
            z-index: 999999 !important;
            opacity: 0;
            display: flex !important;
            align-items: center;
            justify-content: center;
            padding: 10px !important;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(10px);
        }
        .live2d-widget-dialog-container.active { 
            opacity: 1 !important; 
            transform: translateY(0);
        }

        #live2d-widget .live2d-widget-dialog {
            color: #000 !important;
            font-size: clamp(12px, 3.5vw, 14px) !important;
            font-weight: bold !important;
            line-height: 1.4 !important;
            font-family: sans-serif !important;
            text-align: center;
        }

        /* 移动端 Live2D 容器位置微调 */
        @media (max-width: 480px) {
            #live2d-widget { transform-origin: bottom right; scale: 0.8; }
        }
    </style>
</head>
<body>

<div class="cassette-player">
    <div style="font-family: var(--font-pixel); color: #666; font-size: 8px; margin-bottom: 15px;">AI MUSIC STATION</div>
    <div class="tape-window">
        <div class="tape-reel left"></div>
        <div class="tape-reel right"></div>
    </div>
    <div id="timeDisplay">READY</div>
    <input type="file" id="audioFile" hidden accept="audio/*">
    <button class="control-btn" onclick="document.getElementById('audioFile').click()">LOAD TAPE</button>
    <div class="btns">
        <button class="control-btn" id="playBtn">PLAY</button>
        <button class="control-btn" id="stopBtn">STOP</button>
    </div>
    <div style="margin-top:10px; font-size: 9px; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000;">[ 点击猫咪互动喵 ]</div>
    <audio id="mainAudio" playsinline></audio>
</div>

<script src="https://unpkg.com/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
<script>
    // --- 1. 移动端动态高度修复 ---
    function updateVh() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    window.addEventListener('resize', updateVh);
    updateVh();

    // --- 2. 初始化 Live2D ---
    L2Dwidget.init({
        "model": { "jsonPath": "https://unpkg.com/live2d-widget-model-shizuku@1.0.5/assets/shizuku.model.json", "scale": 1 },
        "display": { 
            "position": "right", 
            "width": window.innerWidth > 480 ? 150 : 100, 
            "height": window.innerWidth > 480 ? 300 : 200, 
            "hOffset": 10, 
            "vOffset": -20 
        },
        "mobile": { "show": true, "scale": 0.5 },
        "dialog": { "enable": true } 
    });

    const API_KEY = 'sk-29e9cc216a944dd2a5f518ace2d4d65a';
    const API_URL = 'https://api.deepseek.com/chat/completions';
    let dialogTimer;

    function showCatSpeech(text, needSpeak = true) {
        const container = document.querySelector('.live2d-widget-dialog-container');
        const dialogBox = document.querySelector('.live2d-widget-dialog');
        
        if (container && dialogBox) {
            clearTimeout(dialogTimer);
            dialogBox.innerText = text;
            container.classList.add('active');
            
            if (needSpeak) {
                // 解锁 iOS 语音合成的关键：必须在交互事件流中
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.pitch = 1.3;
                window.speechSynthesis.speak(utterance);
            }
            dialogTimer = setTimeout(() => { container.classList.remove('active'); }, 5000);
        }
    }

    async function askAI(userText) {
        showCatSpeech("让我想想喵...", false);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        { role: "system", content: "你是一只叫Hijiki的黑猫。说话以'喵'结尾。简洁回答喵。" },
                        { role: "user", content: userText }
                    ]
                })
            });
            const data = await response.json();
            showCatSpeech(data.choices[0].message.content);
        } catch (error) {
            showCatSpeech("断网了喵！");
        }
    }

    // --- 3. 语音识别逻辑 ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.onresult = (e) => askAI(e.results[0][0].transcript);
        recognition.onstart = () => { document.getElementById('live2dcanvas').style.filter = "drop-shadow(0 0 10px #00f2ff)"; };
        recognition.onend = () => { document.getElementById('live2dcanvas').style.filter = "none"; };
    }

    // --- 4. 交互解锁与初始化 ---
    window.onload = function() {
        const checkCanvas = setInterval(() => {
            const canvas = document.getElementById('live2dcanvas');
            if (canvas) {
                clearInterval(checkCanvas);
                
                const startInteraction = (e) => {
                    // 移动端音频/语音全解锁
                    const silentUtterance = new SpeechSynthesisUtterance("");
                    window.speechSynthesis.speak(silentUtterance);
                    
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    if (ctx.state === 'suspended') ctx.resume();

                    if (recognition) {
                        try { recognition.start(); } catch(err) {}
                    } else {
                        showCatSpeech("手机浏览器建议使用 Chrome 喵~");
                    }
                };

                // 兼容 PC 点击与移动端触摸
                canvas.addEventListener('click', startInteraction);
                canvas.addEventListener('touchstart', (e) => {
                    startInteraction();
                }, { passive: true });

                document.getElementById('live2d-widget').style.pointerEvents = "none";
                canvas.style.pointerEvents = "auto";
                canvas.style.cursor = "pointer";
            }
        }, 500);
    };

    // --- 5. 播放器控制 ---
    const audio = document.getElementById('mainAudio');
    const playBtn = document.getElementById('playBtn');
    const reels = document.querySelectorAll('.tape-reel');

    document.getElementById('audioFile').onchange = (e) => {
        const file = e.target.files[0];
        if(file) { 
            audio.src = URL.createObjectURL(file); 
            document.getElementById('timeDisplay').innerText = "TAPE READY"; 
        }
    };

    playBtn.onclick = () => {
        if(!audio.src) return showCatSpeech("还没装磁带喵！");
        if(audio.paused) {
            audio.play().then(() => {
                playBtn.innerText = "PAUSE";
                reels.forEach(r => r.classList.add('playing'));
            }).catch(err => {
                showCatSpeech("请先点我解锁声音喵！");
            });
        } else {
            audio.pause(); 
            playBtn.innerText = "PLAY";
            reels.forEach(r => r.classList.remove('playing'));
        }
    };

    document.getElementById('stopBtn').onclick = () => {
        audio.pause(); 
        audio.currentTime = 0; 
        playBtn.innerText = "PLAY";
        reels.forEach(r => r.classList.remove('playing'));
        document.getElementById('timeDisplay').innerText = "STOPPED";
    };
</script>
</body>
</html>
