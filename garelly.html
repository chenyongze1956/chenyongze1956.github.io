
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff); background-size: cover; background-position: center; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; color: #fff; transition: background 0.8s ease; }
        .container { width: 90%; max-width: 450px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(25px); padding: 30px; border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8); max-height: 90vh; overflow-y: auto; }
        .search-box { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #444; background: rgba(0,0,0,0.5); color: #fff; outline: none; font-size: 1rem; }
        button { padding: 0 20px; background: #e94560; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ff5e78; transform: scale(1.05); }
        #resultArea { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: left; display: none; }
        .desc { font-size: 0.85rem; color: #ddd; line-height: 1.6; margin: 15px 0; max-height: 100px; overflow-y: auto; }
        /* 新增：直达链接样式 */
        .link-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .link-btn { padding: 6px 12px; background: rgba(255,255,255,0.2); border-radius: 8px; font-size: 0.75rem; color: white; text-decoration: none; transition: 0.2s; }
        .link-btn:hover { background: #00d2ff; }
        .cast-scroll { display: flex; overflow-x: auto; gap: 12px; scrollbar-width: none; }
        .cast-item { flex: 0 0 60px; text-align: center; font-size: 0.7rem; cursor: pointer; }
        .cast-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(233, 69, 96, 0.4); }
        #actorModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; backdrop-filter: blur(10px); text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #e94560; margin-top: 0;">🎬 影迷百科搜索</h2>
        <div class="search-box">
            <input type="text" id="keywordInput" placeholder="输入影视剧名称...">
            <button id="searchBtn">搜索</button>
        </div>
        <div id="resultArea">
            <b id="mTitle" style="font-size: 1.3rem;"></b>
            <p id="mDesc" class="desc"></p>
            <div class="link-bar" id="linkBar"></div>
            <div style="font-size: 0.85rem; color: #e94560; font-weight: bold; margin-bottom: 10px;">🌟 领衔主演 (点击溯源)</div>
            <div class="cast-scroll" id="castList"></div>
        </div>
    </div>

    <div id="actorModal">
        <div style="max-width: 450px; margin: 0 auto;">
            <button onclick="document.getElementById('actorModal').style.display='none'">关闭</button>
            <h3 id="actorName" style="color:#00d2ff;"></h3>
            <div id="actorWorks" style="font-size: 0.85rem; color: #eee; line-height: 2;"></div>
        </div>
    </div>

<script>
    const TMDB_KEY = 'a2a3fdd1a00d32cca3550a8884a82327';
    const keywordInput = document.getElementById('keywordInput');
    const searchBtn = document.getElementById('searchBtn');

    searchBtn.onclick = async () => {
        const kw = keywordInput.value.trim();
        if (!kw) return;
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(kw)}&language=zh-CN`);
        const data = await res.json();
        if (data.results?.length > 0) showResult(data.results[0]);
    };

    async function showResult(item) {
        document.getElementById('resultArea').style.display = 'block';
        const title = item.title || item.name;
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mDesc').innerText = item.overview || "暂无简介。";
        
        // 渲染跳转链接
        const links = [
            { name: 'B站', url: 'https://search.bilibili.com/all?keyword=' },
            { name: '爱奇艺', url: 'https://www.iqiyi.com/search/?q=' },
            { name: 'YouTube', url: 'https://www.youtube.com/results?search_query=' }
        ];
        document.getElementById('linkBar').innerHTML = links.map(l => 
            `<a href="${l.url}${encodeURIComponent(title)}" target="_blank" class="link-btn">${l.name} 搜索</a>`
        ).join('');
        
        // 获取演职员
        const type = item.media_type === 'tv' ? 'tv' : 'movie';
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${item.id}/credits?api_key=${TMDB_KEY}&language=zh-CN`);
        const data = await res.json();
        const list = document.getElementById('castList');
        list.innerHTML = '';
        data.cast.slice(0, 8).forEach(p => {
            const div = document.createElement('div');
            div.className = 'cast-item';
            div.innerHTML = `<img src="${p.profile_path ? 'https://image.tmdb.org/t/p/w200'+p.profile_path : 'https://via.placeholder.com/50'}" class="cast-img"><div>${p.name}</div>`;
            div.onclick = () => fetchActorWorks(p.id, p.name);
            list.appendChild(div);
        });
    }

    async function fetchActorWorks(id, name) {
        const modal = document.getElementById('actorModal');
        document.getElementById('actorName').innerText = "溯源：" + name;
        document.getElementById('actorWorks').innerHTML = "查询中...";
        modal.style.display = 'block';
        const res = await fetch(`https://api.themoviedb.org/3/person/${id}/movie_credits?api_key=${TMDB_KEY}&language=zh-CN`);
        const data = await res.json();
        document.getElementById('actorWorks').innerHTML = data.cast.sort((a,b) => (b.release_date||'').localeCompare(a.release_date||'')).map(m => 
            `<div>📅 ${m.release_date?.split('-')[0] || '未知'} - ${m.title || m.name}</div>`
        ).join('');
    }
</script>
</body>
</html>
