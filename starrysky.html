<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>古巴比伦星象观测</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
        #ui { position: absolute; top: 30px; left: 30px; color: #d4af37; pointer-events: none; font-family: 'Georgia', serif; }
        h1 { margin: 0; font-size: 28px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>古巴比伦星空观测</h1>
        <p>黄道轨迹 • 神谕流星</p>
    </div>
    <canvas id="skyCanvas"></canvas>

<script>
    const canvas = document.getElementById('skyCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let stars = [];
    let meteors = [];

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        initStars();
    }

    function initStars() {
        stars = Array.from({length: 200}, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            r: Math.random() * 1.2,
            alpha: Math.random()
        }));
    }

    class Meteor {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * width * 1.5 - width * 0.5;
            this.y = -50;
            this.vx = Math.random() * 10 + 5;
            this.vy = Math.random() * 10 + 5;
            this.len = Math.random() * 100 + 50;
            this.alpha = 1;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.alpha -= 0.01;
            if (this.alpha <= 0) this.reset();
        }
        draw() {
            ctx.strokeStyle = `rgba(212, 175, 55, ${this.alpha})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - this.len, this.y - this.len);
            ctx.stroke();
        }
    }

    function draw() {
        // 动态拖影
        ctx.fillStyle = 'rgba(11, 14, 20, 0.2)';
        ctx.fillRect(0, 0, width, height);

        // 绘制恒星
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(Date.now() * 0.005 + s.x) * 0.5})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        });

        // 绘制黄道轨迹
        ctx.strokeStyle = 'rgba(212, 175, 55, 0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(width/2, height/2, 300, 0, Math.PI * 2);
        ctx.stroke();

        // 处理流星

        requestAnimationFrame(draw);
    }

    // 初始化流星群
    for(let i=0; i<3; i++) meteors.push(new Meteor());
    window.addEventListener('resize', resize);
    resize();
    draw();
</script>
</body>
</html>
