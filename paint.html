<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修行路 - 全功能修复版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer utilities {
            .tool-active { @apply bg-blue-600 text-white scale-105 shadow-md; }
            .tool-button { @apply flex items-center justify-center md:justify-start w-12 h-12 md:w-full rounded-lg p-2 transition-all hover:bg-gray-100 active:scale-95; }
            .color-swatch { @apply w-8 h-8 rounded-full cursor-pointer transition-transform hover:scale-110 border-2 border-transparent; }
            .color-swatch.active { @apply border-white ring-2 ring-blue-600; }
        }
        body { @apply bg-gray-50 overflow-hidden m-0 p-0; }
        #drawingCanvas { 
            background: linear-gradient(45deg, #ff7e5f, #feb47b, #ffed86, #9feb8f, #5fbfff, #9b8eff); 
            touch-action: none;
            cursor: crosshair;
        }
        .toolbar { @apply bg-white/80 backdrop-blur shadow-lg p-2 z-10 absolute rounded-xl; }
        .toolbar-desktop { @apply w-16 md:w-48 top-4 left-4 flex flex-col; }
        #brush-cursor {
            @apply fixed pointer-events-none border border-gray-400 rounded-full z-[100] mix-blend-difference;
            display: none;
        }
    </style>
</head>
<body>

<div id="brush-cursor"></div>

<div class="flex h-screen w-screen relative">
    <canvas id="drawingCanvas"></canvas>

    <!-- 工具栏 -->
    <div class="toolbar toolbar-desktop">
        <button class="tool-button tool-active" data-tool="pencil"><i class="fa fa-pencil mr-0 md:mr-2"></i><span class="hidden md:inline">铅笔</span></button>
        <button class="tool-button" data-tool="eraser"><i class="fa fa-eraser mr-0 md:mr-2"></i><span class="hidden md:inline">橡皮</span></button>
        <button class="tool-button" data-tool="rectangle"><i class="fa fa-square-o mr-0 md:mr-2"></i><span class="hidden md:inline">矩形</span></button>
        <button class="tool-button" data-tool="circle"><i class="fa fa-circle-o mr-0 md:mr-2"></i><span class="hidden md:inline">圆形</span></button>
        <div class="border-t my-2"></div>
        <button class="tool-button text-blue-600" data-action="undo"><i class="fa fa-reply mr-0 md:mr-2"></i><span class="hidden md:inline">撤销</span></button>
        <!-- 恢复保存按钮 -->
        <button class="tool-button text-green-600" data-action="save"><i class="fa fa-download mr-0 md:mr-2"></i><span class="hidden md:inline">保存图片</span></button>
        <button class="tool-button text-red-500" data-action="clear"><i class="fa fa-trash-o mr-0 md:mr-2"></i><span class="hidden md:inline">清空</span></button>
    </div>

    <!-- 控制栏 -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur p-3 rounded-2xl shadow-xl flex items-center gap-4 z-10">
        <div class="flex gap-2">
            <div class="color-swatch active bg-black" data-color="#000000"></div>
            <div class="color-swatch bg-red-500" data-color="#ef4444"></div>
            <div class="color-swatch bg-blue-500" data-color="#3b82f6"></div>
            <div class="color-swatch bg-green-500" data-color="#22c55e"></div>
        </div>
        <div class="h-8 border-l border-gray-300"></div>
        <input type="range" id="brushSize" min="1" max="50" value="5" class="w-24 accent-blue-600">
        <span id="sizeValue" class="text-xs font-bold w-4">5</span>
    </div>
</div>

<script>
    let canvas, ctx;
    let isDrawing = false;
    let startX, startY;
    let snapshot; 
    let currentTool = 'pencil';
    let currentColor = '#000000';
    let currentSize = 5;
    let historyStack = [];

    document.addEventListener('DOMContentLoaded', () => {
        canvas = document.getElementById('drawingCanvas');
        ctx = canvas.getContext('2d', { willReadFrequently: true });
        resizeCanvas();
        saveState(); // 初始状态
        setupEvents();
    });

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function setupEvents() {
        document.querySelectorAll('[data-tool]').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('tool-active'));
                btn.classList.add('tool-active');
                currentTool = btn.dataset.tool;
            };
        });

        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.onclick = () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
                currentColor = swatch.dataset.color;
            };
        });

        document.getElementById('brushSize').oninput = (e) => {
            currentSize = e.target.value;
            document.getElementById('sizeValue').innerText = currentSize;
        };

        // 按钮功能逻辑
        document.querySelectorAll('[data-action]').forEach(btn => {
            btn.onclick = () => {
                const action = btn.dataset.action;
                if(action === 'undo') undo();
                if(action === 'clear') {
                    if(confirm("确定要清空画布吗？")) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        saveState();
                    }
                }
                if(action === 'save') {
                    saveImage(); // 调用保存逻辑[cite: 1]
                }
            };
        });

        canvas.onmousedown = start;
        canvas.onmousemove = move;
        canvas.onmouseup = stop;
    }

    function start(e) {
        isDrawing = true;
        startX = e.clientX;
        startY = e.clientY;
        snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : currentColor;
        ctx.lineWidth = currentSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    function move(e) {
        updateCursor(e);
        if (!isDrawing) return;

        const x = e.clientX;
        const y = e.clientY;

        if (currentTool === 'rectangle' || currentTool === 'circle') {
            ctx.putImageData(snapshot, 0, 0);
        }

        if (currentTool === 'pencil' || currentTool === 'eraser') {
            ctx.lineTo(x, y);
            ctx.stroke();
        } else if (currentTool === 'rectangle') {
            ctx.strokeRect(startX, startY, x - startX, y - startY);
        } else if (currentTool === 'circle') {
            const radius = Math.sqrt(Math.pow(startX - x, 2) + Math.pow(startY - y, 2));
            ctx.beginPath();
            ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
            ctx.stroke();
        }
    }

    function stop() {
        if (isDrawing) saveState();
        isDrawing = false;
    }

    function updateCursor(e) {
        const cursor = document.getElementById('brush-cursor');
        cursor.style.display = 'block';
        cursor.style.width = currentSize + 'px';
        cursor.style.height = currentSize + 'px';
        cursor.style.left = (e.clientX - currentSize/2) + 'px';
        cursor.style.top = (e.clientY - currentSize/2) + 'px';
    }

    // 保存图片逻辑[cite: 1]
    function saveImage() {
        const link = document.createElement('a');
        link.download = `我的作品-${new Date().getTime()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    function saveState() {
        if (historyStack.length >= 20) historyStack.shift();
        historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    }

    function undo() {
        if (historyStack.length > 1) {
            historyStack.pop();
            ctx.putImageData(historyStack[historyStack.length - 1], 0, 0);
        }
    }
</script>
</body>
</html>
