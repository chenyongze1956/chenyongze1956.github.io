
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://unpkg.com/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
    <style>
        body { background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff); margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .camera-box {
            position: relative; width: 85vw; max-width: 400px; aspect-ratio: 3/4;
            border: 2px solid #22d3ee; border-radius: 24px; overflow: hidden; background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .hud {
            position: fixed; top: 20px; background: rgba(15, 23, 42, 0.8);
            padding: 8px 15px; border-radius: 12px; color: #22d3ee;
            font-family: monospace; font-size: 12px; z-index: 100;
            border: 1px solid rgba(34, 211, 238, 0.3); text-align: center;
        }
        #live2d-widget { pointer-events: none !important; }
    </style>
</head>
<body>

    <div class="hud">
        STATUS: <span id="stat">请点击屏幕授权</span><br>
        COORDS: <span id="coords">0, 0</span>
    </div>

    <div class="camera-box">
        <video id="video" playsinline muted autoplay></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const stat = document.getElementById('stat');
        const coordsText = document.getElementById('coords');
        let isActive = false;

        // 1. 初始化看板娘
        L2Dwidget.init({
            "model": { "jsonPath": "https://unpkg.com/live2d-widget-model-hijiki@1.0.5/assets/hijiki.model.json" },
            "display": { "position": "right", "width": window.innerWidth < 768 ? 140 : 220, "height": window.innerWidth < 768 ? 220 : 350 }
        });

        // 2. 配置 AI
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(results => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                const nose = results.multiFaceLandmarks[0][1];
                const x = (0.5 + (0.5 - nose.x) * 1.8) * window.innerWidth;
                const y = (0.5 + (nose.y - 0.5) * 1.8) * window.innerHeight;
                
                coordsText.innerText = `${Math.round(x)}, ${Math.round(y)}`;
                stat.innerText = "追踪中 ✅";

                // 分发事件驱动猫
                const moveEvt = new MouseEvent('mousemove', { clientX: x, clientY: y, bubbles: true });
                window.dispatchEvent(moveEvt);
                document.dispatchEvent(moveEvt);
                const canvas = document.getElementById('live2dcanvas');
                if (canvas) canvas.dispatchEvent(moveEvt);
            } else {
                stat.innerText = "识别中断: 请面向摄像头";
            }
        });

        // 3. 稳健的驱动循环
        async function detectFrame() {
            if (!isActive) return;
            if (video.readyState >= 2) {
                try {
                    await faceMesh.send({ image: video });
                } catch (e) {
                    console.warn("跳帧处理中...");
                }
            }
            requestAnimationFrame(detectFrame);
        }

        // 4. 启动函数
        async function startSystem() {
            try {
                stat.innerText = "正在开启摄像头...";
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                video.srcObject = stream;
                isActive = true;
                
                video.onloadedmetadata = () => {
                    video.play();
                    stat.innerText = "正在同步面部...";
                    detectFrame();
                };
            } catch (err) {
                stat.innerText = "启动失败: 需要HTTPS及授权";
            }
        }

        // 点击激活
        document.body.addEventListener('click', () => {
            if (!isActive) startSystem();
        }, { once: true });
    </script>
</body>
</html>
