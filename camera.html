
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {      background: linear-gradient(45deg,#ff7e5f,#feb47b,#ffed86,#9feb8f,#5fbfff,#9b8eff); min-height: 100vh; overflow: hidden; color: white; font-family: system-ui, -apple-system, sans-serif; }
        .camera-container { aspect-ratio: 9/16; max-height: 80vh; width: 100%; max-width: 400px; position: relative; }
        
        .scan-line {
            height: 3px; background: #60a5fa; box-shadow: 0 0 20px #3b82f6;
            position: absolute; width: 100%; top: -2px; z-index: 40;
            display: none; animation: scanning 2s linear infinite;
        }
        @keyframes scanning { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        .face-box {
            position: absolute; border: 2px solid rgba(96, 165, 250, 0.5);
            width: 220px; height: 280px; top: 45%; left: 50%;
            transform: translate(-50%, -50%); border-radius: 40px; z-index: 30;
        }
        .corner { position: absolute; width: 20px; height: 20px; border: 4px solid #60a5fa; }
        .tl { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .tr { top: -5px; right: -5px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -5px; left: -5px; border-right: 0; border-top: 0; }
        .br { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

        #loading-overlay { display: none; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="camera-container rounded-3xl overflow-hidden shadow-2xl border-4 border-gray-700 bg-black">
        <div id="scan-line" class="scan-line"></div>
        <div class="face-box">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
        </div>
        
        <video id="video" class="w-full h-full object-cover" autoplay muted playsinline style="transform: scaleX(-1);"></video>

        <div id="loading-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
            <p class="mt-4 text-blue-400 font-bold tracking-widest text-sm">云端 AI 正在扫描面部特征...</p>
        </div>

        <div class="absolute bottom-0 inset-x-0 p-6 bg-gradient-to-t from-black/90 to-transparent">
            <div class="flex justify-between items-center">
                <button id="toggle-camera" class="text-white p-3 bg-white/10 rounded-full backdrop-blur">
                    <i class="fa fa-refresh text-xl"></i>
                </button>
                <button id="capture-btn" class="relative group">
                    <div class="w-20 h-20 rounded-full border-4 border-blue-500/50 flex items-center justify-center active:scale-90 transition-transform">
                        <div class="w-16 h-16 rounded-full bg-blue-600 flex flex-col items-center justify-center text-white shadow-lg shadow-blue-500/50">
                            <i class="fa fa-eye text-lg"></i>
                            <span class="text-[8px] font-bold">开始检测</span>
                        </div>
                    </div>
                </button>
                <div class="w-12 h-12"></div>
            </div>
        </div>
    </div>

    <div id="preview-modal" class="fixed inset-0 bg-slate-950 z-50 hidden flex flex-col items-center p-6 overflow-y-auto">
        <div class="relative w-full max-w-sm rounded-3xl overflow-hidden border-2 border-blue-500/30 shadow-2xl">
            <img id="preview-image" class="w-full h-auto" alt="Captured">
            <div class="absolute top-4 right-4 bg-black/60 backdrop-blur-md rounded-2xl p-3 border border-white/20 text-center min-w-[80px]">
                <div class="text-[10px] text-gray-400 uppercase">颜值评分</div>
                <div id="beauty-score" class="text-3xl font-black text-yellow-400">--</div>
            </div>
        </div>

        <div class="w-full max-w-sm mt-6 space-y-4">
            <div class="bg-blue-600/20 border border-blue-500/30 rounded-2xl p-4 flex items-center justify-between">
                <div>
                    <div class="text-xs text-blue-400">相似明星 Face Match</div>
                    <div id="star-name" class="text-xl font-bold text-white">分析中...</div>
                </div>
                <div class="text-right">
                    <div class="text-[10px] text-gray-400">匹配度</div>
                    <div class="text-lg font-mono text-blue-300"><span id="match-rate">--</span>%</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/5 rounded-xl p-3 border border-white/10 text-center">
                    <div class="text-[10px] text-gray-400">预测年龄</div>
                    <div class="text-lg font-bold"><span id="predicted-age">--</span> 岁</div>
                </div>
                <div class="bg-white/5 rounded-xl p-3 border border-white/10 text-center">
                    <div class="text-[10px] text-gray-400">性别检测</div>
                    <div id="detected-gender" class="text-lg font-bold text-green-400">--</div>
                </div>
            </div>

            <div class="flex space-x-3 pt-2 pb-8">
                <button onclick="location.reload()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold">重新拍摄</button>
                <button id="save-btn" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/50">保存报告</button>
            </div>
        </div>
    </div>

    <script>
        // 已配置的 Face++ 凭证
        const API_KEY = "Hpmt9Yim0zlRYwkhGllCMFkLama9vxNu";
        const API_SECRET = "PhCtY0gKGC6Ys6k80vTdYQ7SVcHvH_o9";

        const video = document.getElementById('video');
        const scanLine = document.getElementById('scan-line');
        const loading = document.getElementById('loading-overlay');
        const previewModal = document.getElementById('preview-modal');
        const previewImage = document.getElementById('preview-image');
        const saveBtn = document.getElementById('save-btn');
        let currentFacingMode = 'user';

        // 明星列表用于趣味展示
        const celebrities = ["吴彦祖", "金城武", "刘亦菲", "迪丽热巴", "王嘉尔", "张曼玉", "梁朝伟", "彭于晏", "周杰伦", "舒淇"];

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
            } catch (err) { alert("摄像头启动失败，请确保使用 HTTPS 环境并授权权限。"); }
        }

        async function captureAndAnalyze() {
            scanLine.style.display = 'block';
            loading.style.display = 'flex';
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            if(currentFacingMode === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0);
            
            // 转换为 JPEG Base64
            const base64Data = canvas.toDataURL('image/jpeg', 0.8).replace(/^data:image\/jpeg;base64,/, "");

            const formData = new FormData();
            formData.append('api_key', API_KEY);
            formData.append('api_secret', API_SECRET);
            formData.append('image_base64', base64Data);
            formData.append('return_attributes', 'age,beauty,gender');

            try {
                const response = await fetch('https://api-cn.faceplusplus.com/facepp/v3/detect', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.faces && result.faces.length > 0) {
                    const attr = result.faces[0].attributes;
                    
                    // 获取真实数据
                    const realAge = attr.age.value;
                    const genderStr = attr.gender.value === 'Male' ? '男' : '女';
                    const beautyValue = attr.gender.value === 'Male' ? attr.beauty.male_score : attr.beauty.female_score;
                    
                    // UI 渲染
                    document.getElementById('predicted-age').innerText = realAge;
                    document.getElementById('beauty-score').innerText = beautyValue.toFixed(1);
                    document.getElementById('detected-gender').innerText = genderStr;
                    
                    const star = celebrities[Math.floor(Math.random() * celebrities.length)];
                    document.getElementById('star-name').innerText = star;
                    document.getElementById('match-rate').innerText = (Math.random() * 5 + 90).toFixed(1);

                    // 准备结果预览图
                    previewImage.src = canvas.toDataURL('image/png');
                    previewModal.classList.remove('hidden');
                } else {
                    alert("未检测到清晰人脸，请正对摄像头重试。");
                }
            } catch (err) {
                alert("云端服务响应失败，请检查网络。");
                console.error(err);
            } finally {
                scanLine.style.display = 'none';
                loading.style.display = 'none';
            }
        }

        saveBtn.onclick = () => {
            const link = document.createElement('a');
            link.href = previewImage.src;
            link.download = `AI_Face_Report_${Date.now()}.png`;
            link.click();
            saveBtn.innerText = "✓ 已存至相册";
        };

        document.getElementById('capture-btn').onclick = captureAndAnalyze;
        document.getElementById('toggle-camera').onclick = () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera();
        };

        window.onload = startCamera;
    </script>
</body>
</html>
